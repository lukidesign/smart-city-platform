<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>冷冻机房监控</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#09111f;
  width:100vw; height:100vh;
  display:flex; align-items:center; justify-content:center;
  font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;
  overflow:hidden; user-select:none;
}

@keyframes fadeIn { from{opacity:0;transform:scale(.98)} to{opacity:1;transform:scale(1)} }
#app { animation:fadeIn .6s ease both; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }

/* ── Pipe flow animations ── */
@keyframes dashF  { to { stroke-dashoffset: -24 } }
@keyframes dashR  { to { stroke-dashoffset:  24 } }
@keyframes dashFS { to { stroke-dashoffset: -18 } }
@keyframes dashRS { to { stroke-dashoffset:  18 } }
@keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.35} }
@keyframes fanSpin { to { transform:rotate(360deg) } }

.cw-sup  { stroke:#f0a020; stroke-width:2; stroke-dasharray:7 5; fill:none; animation:dashF  .85s linear infinite; }
.cw-ret  { stroke:#d84030; stroke-width:2; stroke-dasharray:7 5; fill:none; animation:dashR  .85s linear infinite; }
.chw-sup { stroke:#4ab8ff; stroke-width:2; stroke-dasharray:7 5; fill:none; animation:dashF  .85s linear infinite; }
.chw-ret { stroke:#00c896; stroke-width:2; stroke-dasharray:7 5; fill:none; animation:dashRS .85s linear infinite; }
.bypass  { stroke:#8890aa; stroke-width:2; stroke-dasharray:5 4; fill:none; animation:dashFS 1.2s linear infinite; }

/* Header lines (solid, no animation) */
.cw-sup-hdr  { stroke:#f0a020; stroke-width:2.5; fill:none; opacity:.7; }
.cw-ret-hdr  { stroke:#d84030; stroke-width:2.5; fill:none; opacity:.7; }
.chw-sup-hdr { stroke:#4ab8ff; stroke-width:2.5; fill:none; opacity:.7; }
.chw-ret-hdr { stroke:#00c896; stroke-width:2.5; fill:none; opacity:.7; }

/* Pump fan (spinning) */
.pump-fan { animation:fanSpin 1.2s linear infinite; }

/* Status dot */
.run-dot { animation:pulse 2.2s ease-in-out infinite; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const ROWS = [
  { id:1, brand:'特灵', cwHz:'46.0', chwHz:'45.0', pct:'78', kw:'125', y:148 },
  { id:2, brand:'特灵', cwHz:'44.0', chwHz:'43.0', pct:'72', kw:'118', y:268 },
  { id:3, brand:'格力', cwHz:'42.0', chwHz:'41.0', pct:'65', kw:'105', y:388 },
  { id:4, brand:'格力', cwHz:'38.0', chwHz:'36.0', pct:'55', kw:'88',  y:508 },
];

const TOWER_CY = [108,168,228,288,348,408,468,528];

// ─────────────────────────────────────────────
// X positions
// ─────────────────────────────────────────────
const CW_SUP_X  = 190;   // CW supply vertical header
const CW_RET_X  = 207;   // CW return vertical header
const CW_PUMP_X = 268;   // CW pump cx
const CW_VLV_X  = 368;   // CW valve cx
const CH_LEFT   = 408;   // Chiller box left x
const CH_RIGHT  = 690;   // Chiller box right x
const CHW_VLV_X = 740;   // CHW valve cx
const CHW_PUMP_X= 848;   // CHW pump cx
const CHW_SUP_X = 930;   // CHW supply vertical header
const CHW_RET_X = 947;   // CHW return vertical header
const DIST_CX   = 1040;  // 分水器/集水器 center x

// Y offsets from row center
const SUP_DY = -13; // supply pipe y offset
const RET_DY = +13; // return pipe y offset

// Vertical header Y extents
const HDR_TOP = ROWS[0].y + SUP_DY - 2;
const HDR_BOT = ROWS[3].y + RET_DY + 2;

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function tx(x, y, s) { return `<text x="${x}" y="${y}" ${s}`; }

function label(x, y, txt, color='rgba(255,255,255,.42)', size=9.5, anchor='middle', extraStyle='') {
  return `<text x="${x}" y="${y}" fill="${color}" font-size="${size}" text-anchor="${anchor}" font-family="-apple-system,sans-serif" ${extraStyle}>${txt}</text>`;
}

function remoteLabel(x, y) {
  return label(x, y, '远程', '#00c896', 8.5, 'middle', 'letter-spacing="0.5"');
}

// Pump symbol: circle + spinning 4-blade
function pump(cx, cy, hz, pumpId, color) {
  const r = 20;
  const lcolor = color;
  const id = `fan_${pumpId}`;
  let s = '';
  // outer ring
  s += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="rgba(255,255,255,.04)" stroke="${color}" stroke-width="1.8"/>`;
  // spinning blades
  s += `<g class="pump-fan" style="transform-origin:${cx}px ${cy}px">`;
  s += `<line x1="${cx}" y1="${cy-13}" x2="${cx}" y2="${cy+13}" stroke="${color}" stroke-width="1.6" stroke-linecap="round"/>`;
  s += `<line x1="${cx-13}" y1="${cy}" x2="${cx+13}" y2="${cy}" stroke="${color}" stroke-width="1.6" stroke-linecap="round"/>`;
  s += `<line x1="${cx-9}" y1="${cy-9}" x2="${cx+9}" y2="${cy+9}" stroke="${color}" stroke-width="1.6" stroke-linecap="round"/>`;
  s += `<line x1="${cx+9}" y1="${cy-9}" x2="${cx-9}" y2="${cy+9}" stroke="${color}" stroke-width="1.6" stroke-linecap="round"/>`;
  s += `</g>`;
  // Hz label below
  s += label(cx, cy + r + 11, `${hz} Hz`, color, 9, 'middle', 'font-weight="600"');
  return s;
}

// Valve symbol: X cross
function valve(cx, cy, color, size=10) {
  const d = size;
  return `<line x1="${cx-d}" y1="${cy-d}" x2="${cx+d}" y2="${cy+d}" stroke="${color}" stroke-width="2.2" stroke-linecap="round"/>
<line x1="${cx+d}" y1="${cy-d}" x2="${cx-d}" y2="${cy+d}" stroke="${color}" stroke-width="2.2" stroke-linecap="round"/>`;
}

// Cooling tower: trapezoid (wider bottom)
function coolingTower(cx, cy, label_n) {
  const TW = 88, TH = 42; // tower width at bottom, height
  const TWT = 64; // width at top
  const tx_left_b = cx - TW/2, tx_right_b = cx + TW/2;
  const tx_left_t = cx - TWT/2, tx_right_t = cx + TWT/2;
  const ty_top = cy - TH/2, ty_bot = cy + TH/2;
  let s = '';
  // body
  s += `<polygon points="${tx_left_t},${ty_top} ${tx_right_t},${ty_top} ${tx_right_b},${ty_bot} ${tx_left_b},${ty_bot}" fill="rgba(160,200,255,.04)" stroke="rgba(120,170,220,.35)" stroke-width="1.2"/>`;
  // fan blades inside (static, just visual)
  s += `<line x1="${cx-18}" y1="${ty_top+10}" x2="${cx+18}" y2="${ty_top+10}" stroke="rgba(120,170,220,.3)" stroke-width="1"/>`;
  s += `<line x1="${cx-14}" y1="${ty_top+16}" x2="${cx+14}" y2="${ty_top+16}" stroke="rgba(120,170,220,.2)" stroke-width="1"/>`;
  // label
  s += label(cx, ty_top - 8, `${label_n}#冷却塔`, 'rgba(255,255,255,.48)', 8.5, 'middle');
  s += remoteLabel(cx, ty_bot + 12);
  return s;
}

// Chiller box
function chiller(id, brand, pct, kw, y) {
  const x = CH_LEFT, w = CH_RIGHT - CH_LEFT, h = 56, ry = y - h/2;
  let s = '';
  // box
  s += `<rect x="${x}" y="${ry}" width="${w}" height="${h}" rx="5" fill="rgba(30,50,90,.5)" stroke="rgba(100,160,255,.25)" stroke-width="1.5"/>`;
  // running dot
  s += `<circle cx="${x+12}" cy="${ry+12}" r="4" fill="#00e090" class="run-dot" style="filter:drop-shadow(0 0 4px #00e090)"/>`;
  // chiller name
  s += label(x + w/2, ry + 22, `${id}#主机  (${brand})`, 'rgba(255,255,255,.75)', 12, 'middle', 'font-weight="600"');
  // pct + kw
  s += label(x + w/2 - 26, ry + 42, `${pct}%`, '#00c896', 11, 'middle', 'font-weight="600"');
  s += label(x + w/2 + 18, ry + 42, `${kw} kW`, 'rgba(255,255,255,.5)', 10, 'middle');
  // 远程
  s += remoteLabel(x + w - 22, ry + 12);
  return s;
}

// Temperature dot + label along a pipe
function tempLabel(x, y, val, color, anchor='middle') {
  let s = `<circle cx="${x}" cy="${y}" r="3.5" fill="${color}" opacity=".85"/>`;
  s += label(x, y - 9, val, color, 9.5, anchor, 'font-weight="500"');
  return s;
}

// ─────────────────────────────────────────────
// BUILD SVG
// ─────────────────────────────────────────────
function buildSVG() {
  const W = 1180, H = 660;
  let s = `<svg viewBox="0 0 ${W} ${H}" width="100%" height="100%" style="max-width:${W}px;max-height:${H}px;display:block;" xmlns="http://www.w3.org/2000/svg">`;
  s += `<rect width="${W}" height="${H}" fill="#09111f"/>`;

  // ── Subtle grid ──────────────────────────────
  for (let x = 0; x < W; x += 40) s += `<line x1="${x}" y1="0" x2="${x}" y2="${H}" stroke="rgba(255,255,255,.018)"/>`;
  for (let y = 0; y < H; y += 40) s += `<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="rgba(255,255,255,.018)"/>`;

  // ── Vertical headers ────────────────────────
  // CW supply (orange) header
  s += `<line class="cw-sup-hdr" x1="${CW_SUP_X}" y1="${HDR_TOP}" x2="${CW_SUP_X}" y2="${HDR_BOT}"/>`;
  // CW return (red) header
  s += `<line class="cw-ret-hdr" x1="${CW_RET_X}" y1="${HDR_TOP}" x2="${CW_RET_X}" y2="${HDR_BOT}"/>`;
  // CHW supply (blue) header
  s += `<line class="chw-sup-hdr" x1="${CHW_SUP_X}" y1="${HDR_TOP}" x2="${CHW_SUP_X}" y2="${HDR_BOT}"/>`;
  // CHW return (teal) header
  s += `<line class="chw-ret-hdr" x1="${CHW_RET_X}" y1="${HDR_TOP}" x2="${CHW_RET_X}" y2="${HDR_BOT}"/>`;

  // ── CW temp sensors near header top ──────────
  // (shown here on the header, not per-row)
  s += tempLabel(CW_SUP_X - 14, HDR_TOP - 16, '28.4°C', '#f0a020', 'end');
  s += tempLabel(CW_RET_X + 14, HDR_TOP - 3,  '35.2°C', '#d84030', 'start');

  // ── CW header top connector to towers ────────
  const CW_TOP = HDR_TOP - 10;
  s += `<line class="cw-sup" x1="${CW_SUP_X}" y1="${CW_TOP}" x2="155" y2="${CW_TOP}"/>`;
  s += `<line class="cw-ret" x1="${CW_RET_X}" y1="${CW_TOP + 18}" x2="155" y2="${CW_TOP + 18}"/>`;

  // ── CW header bottom connector ───────────────
  const CW_BOT = HDR_BOT + 10;
  s += `<line class="cw-sup" x1="${CW_SUP_X}" y1="${CW_BOT}" x2="155" y2="${CW_BOT}"/>`;
  s += `<line class="cw-ret" x1="${CW_RET_X}" y1="${CW_BOT + 18}" x2="155" y2="${CW_BOT + 18}"/>`;

  // ── Cooling towers ──────────────────────────
  for (let i = 0; i < 8; i++) {
    const tcy = TOWER_CY[i];
    s += coolingTower(80, tcy, i + 1);
    // connect each tower to CW headers
    const py = tcy - 6;
    s += `<line class="cw-sup" x1="124" y1="${py}" x2="${CW_SUP_X}" y2="${py}" style="animation-delay:${i*0.1}s"/>`;
    s += `<line class="cw-ret" x1="124" y1="${py+12}" x2="${CW_RET_X}" y2="${py+12}" style="animation-delay:${i*0.1+0.4}s"/>`;
  }

  // ── 分水器 (water distributor, top-right) ────
  const DIST_X = 985, DIST_W = 68;
  const DIST_TOP = 72, DIST_BOT = 222;
  s += drawCylinder(DIST_X, DIST_TOP, DIST_W, DIST_BOT - DIST_TOP, '#4ab8ff', '分水器');
  // CHW pressure sensor
  s += label(DIST_X + DIST_W + 4, DIST_TOP + 20, '1.0 KPa', 'rgba(255,255,255,.45)', 9, 'start');
  s += label(DIST_X + DIST_W + 4, DIST_TOP + 34, '7.0°C', '#4ab8ff', 9.5, 'start', 'font-weight="600"');
  // Connect CHW supply header to 分水器
  s += `<line class="chw-sup" x1="${CHW_SUP_X}" y1="${HDR_TOP}" x2="${CHW_SUP_X}" y2="${DIST_BOT}"/>`;
  s += `<line class="chw-sup" x1="${CHW_SUP_X}" y1="${DIST_TOP + 30}" x2="${DIST_X}" y2="${DIST_TOP + 30}"/>`;

  // ── 集水器 (water collector, bottom-right) ───
  const COL_TOP = 430, COL_BOT = 580;
  s += drawCylinder(DIST_X, COL_TOP, DIST_W, COL_BOT - COL_TOP, '#00c896', '集水器');
  // pressure + temp
  s += label(DIST_X + DIST_W + 4, COL_TOP + 20, '1.0 KPa', 'rgba(255,255,255,.45)', 9, 'start');
  s += label(DIST_X + DIST_W + 4, COL_TOP + 34, '12.0°C', '#00c896', 9.5, 'start', 'font-weight="600"');
  // Connect CHW return header to 集水器
  s += `<line class="chw-ret" x1="${CHW_RET_X}" y1="${HDR_BOT}" x2="${CHW_RET_X}" y2="${COL_TOP + 30}"/>`;
  s += `<line class="chw-ret" x1="${CHW_RET_X}" y1="${COL_TOP + 30}" x2="${DIST_X}" y2="${COL_TOP + 30}"/>`;

  // ── 旁通阀 + bypass pipe ─────────────────────
  const BP_X = DIST_X + DIST_W/2;
  const BP_Y1 = DIST_BOT + 8, BP_Y2 = COL_TOP - 8, BP_MID = (BP_Y1 + BP_Y2) / 2;
  s += `<line class="bypass" x1="${BP_X}" y1="${BP_Y1}" x2="${BP_X}" y2="${BP_Y2}"/>`;
  // Bypass valve X at midpoint
  s += valve(BP_X, BP_MID, '#8890aa', 9);
  // Label
  s += label(BP_X + 12, BP_MID + 4, '旁通阀', 'rgba(255,255,255,.42)', 9, 'start');
  s += label(BP_X + 12, BP_MID + 16, '1.0 %', '#8890aa', 9, 'start', 'font-weight="600"');

  // ── Rows (4 chillers) ───────────────────────
  ROWS.forEach((row, i) => {
    s += drawRow(row, i);
  });

  // ── Legend ──────────────────────────────────
  s += drawLegend(W);

  s += `</svg>`;
  return s;
}

// ─────────────────────────────────────────────
// DRAW ROW
// ─────────────────────────────────────────────
function drawRow(row, idx) {
  const { id, brand, cwHz, chwHz, pct, kw, y } = row;
  const supY = y + SUP_DY;  // supply pipe y
  const retY = y + RET_DY;  // return pipe y
  const delay = idx * 0.15;
  let s = '';

  // ── CW supply pipe segments (orange →) ──────
  // header → pump
  s += `<line class="cw-sup" x1="${CW_SUP_X}" y1="${supY}" x2="${CW_PUMP_X-20}" y2="${supY}" style="animation-delay:${delay}s"/>`;
  // pump → valve
  s += `<line class="cw-sup" x1="${CW_PUMP_X+20}" y1="${supY}" x2="${CW_VLV_X-11}" y2="${supY}" style="animation-delay:${delay+.1}s"/>`;
  // valve → chiller
  s += `<line class="cw-sup" x1="${CW_VLV_X+11}" y1="${supY}" x2="${CH_LEFT}" y2="${supY}" style="animation-delay:${delay+.2}s"/>`;

  // ── CW return pipe (red ←, straight) ────────
  s += `<line class="cw-ret" x1="${CH_LEFT}" y1="${retY}" x2="${CW_RET_X}" y2="${retY}" style="animation-delay:${delay+.05}s"/>`;

  // ── CHW supply pipe segments (blue →) ───────
  // chiller → valve
  s += `<line class="chw-sup" x1="${CH_RIGHT}" y1="${supY}" x2="${CHW_VLV_X-11}" y2="${supY}" style="animation-delay:${delay+.1}s"/>`;
  // valve → pump
  s += `<line class="chw-sup" x1="${CHW_VLV_X+11}" y1="${supY}" x2="${CHW_PUMP_X-20}" y2="${supY}" style="animation-delay:${delay+.2}s"/>`;
  // pump → header
  s += `<line class="chw-sup" x1="${CHW_PUMP_X+20}" y1="${supY}" x2="${CHW_SUP_X}" y2="${supY}" style="animation-delay:${delay+.3}s"/>`;

  // ── CHW return pipe (teal ←, straight) ──────
  s += `<line class="chw-ret" x1="${CHW_RET_X}" y1="${retY}" x2="${CH_RIGHT}" y2="${retY}" style="animation-delay:${delay+.05}s"/>`;

  // ── CW pump ──────────────────────────────────
  s += pump(CW_PUMP_X, supY, cwHz, `cw${id}`, '#f0a020');
  s += label(CW_PUMP_X, supY - 42, `${id}#冷却泵`, 'rgba(255,255,255,.5)', 8.8, 'middle');
  s += remoteLabel(CW_PUMP_X, supY - 29);

  // ── CW valve ─────────────────────────────────
  s += valve(CW_VLV_X, supY, '#f0a020', 9);
  s += label(CW_VLV_X, supY - 24, `${id}#冷却阀`, 'rgba(255,255,255,.4)', 8, 'middle');

  // ── Chiller box ──────────────────────────────
  s += chiller(id, brand, pct, kw, y);

  // ── CHW valve ────────────────────────────────
  s += valve(CHW_VLV_X, supY, '#4ab8ff', 9);
  s += label(CHW_VLV_X, supY - 24, `${id}#冷冻阀`, 'rgba(255,255,255,.4)', 8, 'middle');

  // ── CHW pump ─────────────────────────────────
  s += pump(CHW_PUMP_X, supY, chwHz, `chw${id}`, '#4ab8ff');
  s += label(CHW_PUMP_X, supY - 42, `${id}#冷冻泵`, 'rgba(255,255,255,.5)', 8.8, 'middle');
  s += remoteLabel(CHW_PUMP_X, supY - 29);

  // ── Temp dots: only on first row to avoid repetition ────
  if (idx === 0) {
    s += tempLabel(CW_PUMP_X - 30, supY - 4, '28.4°C', '#f0a020', 'end');
    s += tempLabel(CH_LEFT - 22, retY - 4, '35.2°C', '#d84030', 'end');
    s += tempLabel(CH_RIGHT + 22, supY - 4, '7.0°C', '#4ab8ff', 'start');
  }

  return s;
}

// ─────────────────────────────────────────────
// CYLINDER (分水器 / 集水器)
// ─────────────────────────────────────────────
function drawCylinder(x, y, w, h, color, name) {
  const ry = 10; // ellipse y-radius
  const cx = x + w / 2;
  let s = '';
  // body rect
  s += `<rect x="${x}" y="${y+ry}" width="${w}" height="${h-ry*2}" fill="rgba(${hexToRgb(color)},.06)" stroke="${color}" stroke-width="1.4" opacity=".8"/>`;
  // top ellipse
  s += `<ellipse cx="${cx}" cy="${y+ry}" rx="${w/2}" ry="${ry}" fill="rgba(${hexToRgb(color)},.12)" stroke="${color}" stroke-width="1.4" opacity=".8"/>`;
  // bottom ellipse
  s += `<ellipse cx="${cx}" cy="${y+h-ry}" rx="${w/2}" ry="${ry}" fill="rgba(${hexToRgb(color)},.06)" stroke="${color}" stroke-width="1.4" opacity=".6"/>`;
  // connection dots on left side (for pipes)
  const dotSpacing = (h - ry * 4) / 3;
  for (let i = 0; i < 4; i++) {
    const dy = y + ry*2 + i * dotSpacing;
    s += `<circle cx="${x}" cy="${dy}" r="3" fill="${color}" opacity=".6"/>`;
  }
  // name
  s += label(cx, y + h/2 + 2, name, color, 11, 'middle', 'font-weight="700" letter-spacing="2"');
  return s;
}

// ─────────────────────────────────────────────
// LEGEND
// ─────────────────────────────────────────────
function drawLegend(W) {
  const lx = W/2 - 240, ly = 632;
  const items = [
    { color:'#f0a020', label:'冷却水供' },
    { color:'#d84030', label:'冷却水回' },
    { color:'#4ab8ff', label:'冷冻水供' },
    { color:'#00c896', label:'冷冻水回' },
  ];
  let s = `<rect x="${lx-12}" y="${ly-14}" width="500" height="22" rx="4" fill="rgba(255,255,255,.025)"/>`;
  items.forEach((item, i) => {
    const ix = lx + i * 124;
    s += `<line x1="${ix}" y1="${ly}" x2="${ix+28}" y2="${ly}" stroke="${item.color}" stroke-width="2" stroke-dasharray="5 3"/>`;
    s += label(ix + 34, ly + 4, item.label, 'rgba(255,255,255,.45)', 9.5, 'start');
  });
  return s;
}

// ─────────────────────────────────────────────
// UTIL
// ─────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
document.getElementById('app').innerHTML = buildSVG();
</script>
</body>
</html>
