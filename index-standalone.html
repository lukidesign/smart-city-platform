<script>
/* Minimal OrbitControls — no CDN dependency */
(function(){
  if(typeof THREE==='undefined') return;
  THREE.OrbitControls = function(camera, domEl){
    this.camera = camera;
    this.target = new THREE.Vector3(0,2,0);
    this.minDistance = 10; this.maxDistance = 28;
    this.minPolarAngle = Math.PI/6; this.maxPolarAngle = Math.PI/2.1;
    this.enablePan = false;
    var offset = camera.position.clone().sub(this.target);
    var sph = new THREE.Spherical().setFromVector3(offset);
    sph.phi = Math.max(Math.PI/6, Math.min(Math.PI/2.1, sph.phi));
    var dragging = false, lastX = 0, lastY = 0;
    var self = this;
    function onDown(e){ dragging=true; lastX=e.clientX; lastY=e.clientY; }
    function onUp(){ dragging=false; }
    function onMove(e){
      if(!dragging) return;
      sph.theta -= (e.clientX-lastX)*0.005;
      sph.phi   -= (e.clientY-lastY)*0.005;
      sph.phi = Math.max(self.minPolarAngle, Math.min(self.maxPolarAngle, sph.phi));
      lastX=e.clientX; lastY=e.clientY;
    }
    function onWheel(e){
      sph.radius += e.deltaY*0.015;
      sph.radius = Math.max(self.minDistance, Math.min(self.maxDistance, sph.radius));
    }
    domEl.addEventListener('mousedown',onDown);
    domEl.addEventListener('mouseup',onUp);
    domEl.addEventListener('mouseleave',onUp);
    domEl.addEventListener('mousemove',onMove);
    domEl.addEventListener('wheel',onWheel,{passive:true});
    this.update = function(){
      var pos = new THREE.Vector3().setFromSpherical(sph).add(self.target);
      camera.position.copy(pos);
      camera.lookAt(self.target);
    };
    this.dispose = function(){
      domEl.removeEventListener('mousedown',onDown);
      domEl.removeEventListener('mouseup',onUp);
      domEl.removeEventListener('mouseleave',onUp);
      domEl.removeEventListener('mousemove',onMove);
      domEl.removeEventListener('wheel',onWheel);
    };
  };
})();
</script>

/* ══════════════════ ERROR BOUNDARY ═════════════════════════════ */
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(e){return{hasError:true,error:e};}
  componentDidCatch(e,info){console.error('ErrorBoundary caught:',e,info);}
  render(){
    if(this.state.hasError){
      return React.createElement('div',{style:{position:'fixed',inset:0,zIndex:9999,background:'linear-gradient(135deg,#0a0e1a 0%,#111827 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'#fff',fontFamily:'Inter,system-ui,sans-serif'}},
        React.createElement('div',{style:{fontSize:48,marginBottom:16}},'⚠'),
        React.createElement('h2',{style:{fontSize:20,fontWeight:600,marginBottom:8}},'Something went wrong'),
        React.createElement('p',{style:{fontSize:14,color:'rgba(255,255,255,0.5)',marginBottom:24,maxWidth:400,textAlign:'center'}},
          String(this.state.error?.message||'An unexpected error occurred')),
        React.createElement('button',{onClick:()=>window.location.reload(),
          style:{padding:'10px 28px',borderRadius:8,border:'1px solid rgba(23,204,200,0.4)',background:'rgba(23,204,200,0.12)',color:'#17ccc8',fontSize:14,cursor:'pointer',fontWeight:500}},
          'Reload Page')
      );
    }
    return this.props.children;
  }
}

const ECtx=createContext(null);
const useE=()=>useContext(ECtx);

function EProvider({children}){
  const [floors,setFloors]=useState(()=>FLOORS.map(f=>({...f,live:f.consumption,alert:false})));
  const [active,setActive]=useState(2);
  const [tab,setTab]=useState('Campus');
  const [range,setRange]=useState('Month');
  const [ecTop,setEcTop]=useState(68);
  const [introReady,setIntroReady]=useState(false);
  useEffect(()=>{
    const id=setInterval(()=>{
      setFloors(prev=>prev.map(f=>{
        // B4: More realistic fluctuation (±8-15% amplitude with occasional spikes)
        const spike=Math.random()<0.08; // 8% chance of sudden spike
        const amplitude=spike?0.18:(0.06+Math.random()*0.09); // spike: ±18%, normal: ±6-15%
        const delta=(Math.random()*2-1)*f.consumption*amplitude;
        const live=Math.round(Math.max(f.consumption*0.7, f.consumption+delta));
        // Alert triggers: spike on any floor, or floor 4 consistently high
        const alert=spike||(f.id===4&&live>f.consumption*1.12);
        return {...f,live,alert};
      }));
    },3000);
    return ()=>clearInterval(id);
  },[]);
  return <ECtx.Provider value={{floors,active,setActive,tab,setTab,range,setRange,ecTop,setEcTop,introReady,setIntroReady}}>{children}</ECtx.Provider>;
}

  const bars=rd.bar.map(d=>({t:d.t,c:Math.round(d.c*ratio),o:Math.round(d.o*ratio)}));
  const yMax=isFloor?Math.ceil((Math.max(...bars.map(d=>d.o))*1.3)/50)*50:rd.barYMax;
  const ref=useRef(null);
  const chartRef=useRef(null);
  const outerRef=useRef(null);
  // Measure offsetTop so the right panel's Cost Allocation header aligns exactly
  useLayoutEffect(()=>{
    if(!outerRef.current)return;
    const update=()=>{
      if(outerRef.current) setEcTop(outerRef.current.offsetTop);
    };
    update();
    const ro=new ResizeObserver(update);
    // Watch the scroll-container (parent of pa1+pa2+...) for size changes (AI card shown/dismissed)
    const container=outerRef.current.parentElement;
    if(container) ro.observe(container);
    return()=>ro.disconnect();
  },[]);

    if(!ref.current)return;

/* ══════════════════ ANIMATION HOOKS ════════════════════════════ */
// 打字机 hook
function useTypewriter(text,speed=16,startDelay=750){
  const [disp,setDisp]=useState('');
  useEffect(()=>{
    setDisp('');let i=0;
    const t=setTimeout(()=>{
      const iv=setInterval(()=>{
        i++;setDisp(text.slice(0,i));
        if(i>=text.length)clearInterval(iv);
      },speed);
      return()=>clearInterval(iv);
    },startDelay);
    return()=>clearTimeout(t);
  },[]);
  return disp;
}
// 数值递增 hook（只在 mount 执行一次）
function useCountUp(target,duration=1100,delay=0){
  const [val,setVal]=useState(0);
  const [done,setDone]=useState(false);
  useEffect(()=>{
    let raf;
    const captured=target;
    const t=setTimeout(()=>{
      const s=performance.now();
      function step(now){
        const p=Math.min((now-s)/duration,1);
        const e=p<0.5?2*p*p:-1+(4-2*p)*p;
        setVal(Math.round(e*captured));
        if(p<1)raf=requestAnimationFrame(step);
        else setDone(true);
      }
      raf=requestAnimationFrame(step);
    },delay);
    return()=>{clearTimeout(t);if(raf)cancelAnimationFrame(raf);};
  },[]);
  return[val,done];
}
// Animated number helper — handles integers and decimals
function AnimVal({v,dec=0,prefix='',suffix=''}){
  const [raw,setRaw]=useState(0);
  useEffect(()=>{
    let raf;
    const t=setTimeout(()=>{
      const s=performance.now(),dur=1100;
      function step(now){
        const p=Math.min((now-s)/dur,1);
        const e=p<0.5?2*p*p:-1+(4-2*p)*p;
        setRaw(e*v);
        if(p<1)raf=requestAnimationFrame(step);
        else setRaw(v);
      }
      raf=requestAnimationFrame(step);
    },0);
    return()=>{clearTimeout(t);if(raf)cancelAnimationFrame(raf);};
  },[]);
  const display=dec>0?raw.toFixed(dec):Math.round(raw);
  return <>{prefix}{display}{suffix}</>;
}

// 折线从左向右逐步绘制插件
const lineDrawPlugin={
  id:'lineClip',
  beforeDatasetsDraw(chart){
    const p=chart._lineProgress!==undefined?chart._lineProgress:1;
    if(p>=1)return;
    const{ctx,chartArea:{left,right,top,bottom}}=chart;
    ctx.save();ctx.beginPath();
    ctx.rect(left,top-5,(right-left)*p,bottom-top+10);
    ctx.clip();
  },
  afterDatasetsDraw(chart){
    if(chart._lineProgress!==undefined&&chart._lineProgress<1)chart.ctx.restore();
  }
};
const crosshairPlugin={
  id:'crosshair',
  afterDraw(chart){
    if(chart.tooltip&&chart.tooltip._active&&chart.tooltip._active.length){
      const ctx=chart.ctx,x=chart.tooltip._active[0].element.x;
      const {top,bottom}=chart.chartArea;
      ctx.save();ctx.beginPath();ctx.moveTo(x,top);ctx.lineTo(x,bottom);
      ctx.lineWidth=1;ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.stroke();ctx.restore();
    }
  }
};

  const co2Total=isFloor?Math.round(rd.savingsTotals.co2*ratio):rd.savingsTotals.co2;
  const fmtSav=v=>v>=1000?`${(v/1000).toFixed(1)}k`:String(v);
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    if(!introReady) return;
    const _maxCost = Math.max(...savings.map(d=>d.cost));
    const _mag     = Math.pow(10, Math.floor(Math.log10(_maxCost||1)));
    const _niceMax = Math.ceil(_maxCost / _mag) * _mag;
    const _step    = _niceMax / 5;
    const _sTicks  = Array.from({length:6},(_,i)=>({value:i*_step}));
    const ch=new Chart(ref.current.getContext('2d'),{
      type:'line',
      plugins:[lineDrawPlugin,crosshairPlugin],
      data:{
        labels:savings.map(d=>d.d),
        datasets:[
          {label:'Cost savings',data:savings.map(d=>d.cost),
           borderColor:'rgba(155,170,215,0.85)',borderWidth:2.5,
           pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:'rgba(155,170,215,1)',
           pointHoverBorderColor:'#fff',pointHoverBorderWidth:1.5,
           tension:.4,fill:false},
          {label:'Energy savings',data:savings.map(d=>d.en),
           borderColor:'#6272e0',borderWidth:1.5,
           pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:'#6272e0',
           pointHoverBorderColor:'#fff',pointHoverBorderWidth:1.5,
           tension:.4,fill:false},
        ],
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:'#0d1829',borderColor:'rgba(255,255,255,.12)',borderWidth:1,
            titleColor:'#fff',bodyColor:'#94a3b8',
            callbacks:{
              label:ctx=>`${ctx.dataset.label}: ${(ctx.raw/1000).toFixed(1)}k`,
              labelColor:ctx=>{
                const c=ctx.datasetIndex===0?'rgba(155,170,215,0.85)':'#6272e0';
                return{borderColor:c,backgroundColor:c,borderRadius:2};
              },
            },
          },
        },
        scales:{
          x:{grid:{color:'rgba(255,255,255,.06)',borderDash:[3,3]},ticks:{color:'#94a3b8',font:{size:10}},border:{display:false}},
          y:{min:0,max:_niceMax,grid:{color:'rgba(255,255,255,.06)',borderDash:[3,3]},ticks:{color:'#94a3b8',font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v},border:{display:false},afterBuildTicks:scale=>{scale.ticks=_sTicks;}},
        },
      },
    });
    ch._lineProgress=0;
    let raf;
    const s=performance.now(),dur=1500;
    function step(now){
      const p=Math.min((now-s)/dur,1);
      ch._lineProgress=p<0.5?2*p*p:-1+(4-2*p)*p;
      ch.draw();
      if(p<1)raf=requestAnimationFrame(step);
      else delete ch._lineProgress;
    }
    raf=requestAnimationFrame(step);
    return()=>{cancelAnimationFrame(raf);ch.destroy();};
  },[active,tab,range,introReady]);
  return(
    <div className="pa4" style={{flex:1,display:'flex',flexDirection:'column',minHeight:220}}>
      <div style={{height:40,display:'flex',alignItems:'center'}}>
        <span style={{fontSize:16,fontWeight:600}}>{rd.savingsTitle}</span>
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',background:'rgba(24,25,31,0.90)',backdropFilter:'blur(2px)',WebkitBackdropFilter:'blur(2px)',borderRadius:10,padding:16,minHeight:0,gap:12}}>
        <div style={{display:'flex',gap:16}}>
          {[[fmtSav(costTotal),'RM','Cost savings'],[fmtSav(enTotal),'kWh','Energy savings'],[String(co2Total),'CO²','Emission']].map(([v,u,l])=>(
            <div key={l} style={{flex:1}}>
              <div style={{display:'flex',alignItems:'baseline',gap:3}}>
                <span style={{fontSize:20,fontWeight:500,color:'#fff'}}>{v}</span>
                <span style={{fontSize:12,color:'rgba(255,255,255,0.45)'}}>{u}</span>
              </div>
              <p style={{fontSize:12,color:'rgba(255,255,255,0.45)',marginTop:2}}>{l}</p>
            </div>
          ))}
        </div>
        <div style={{flex:1,minHeight:60}}><canvas ref={ref}/></div>
      </div>
    </div>
  );
}

function useMobile(){
  const [m,setM]=useState(()=>window.innerWidth<768);
  useEffect(()=>{
    const onR=()=>setM(window.innerWidth<768);
    window.addEventListener('resize',onR);
    return()=>window.removeEventListener('resize',onR);
  },[]);
  return m;
}
// Returns the right-panel width that CSS media queries will apply
function useRpWidth(){
  const get=()=>420;
  const [w,setW]=useState(get);
  useEffect(()=>{
    const onR=()=>setW(get());
    window.addEventListener('resize',onR);
    return()=>window.removeEventListener('resize',onR);
  },[]);
  return w;
}

    ROOMS.forEach(r=>{

/* ══════════════════ GLOBE 3D ════════════════════════════════════ */
function Globe3D({onClose}){
  const mountRef=useRef(null);
  const [showBldg,setShowBldg]=useState(false);
  const [showZBldg,setShowZBldg]=useState(false);
  const [zbFloor,setZbFloor]=useState(2);
  const [zbImgError,setZbImgError]=useState(false);
  const [showFloor,setShowFloor]=useState(false);
  const [ready,setReady]=useState(false);
  const flyRef=useRef({active:false,targetRy:0,targetRx:0,onDone:null});
  useEffect(()=>{
    const el=mountRef.current;if(!el)return;
    const W=el.clientWidth,H=el.clientHeight;
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(45,W/H,0.1,2000);
    camera.position.set(0,0,2.5);
    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
    renderer.setSize(W,H);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setClearColor(0x000005,1);
    el.appendChild(renderer.domElement);

    // Stars
    const starGeo=new THREE.BufferGeometry();
    const starCount=12000;const sp=new Float32Array(starCount*3);
    for(let i=0;i<starCount*3;i++) sp[i]=(Math.random()-0.5)*800;
    starGeo.setAttribute('position',new THREE.BufferAttribute(sp,3));
    const starMat=new THREE.PointsMaterial({color:0xffffff,size:0.6,sizeAttenuation:true,transparent:true,opacity:0.85});
    scene.add(new THREE.Points(starGeo,starMat));

    // Globe group
    const group=new THREE.Group();scene.add(group);

    // ── TAR UMT Marker ───────────────────────────────────────────────
    function latLngTo3D(lat,lng,r){
      const phi=(90-lat)*Math.PI/180;
      const theta=(lng+180)*Math.PI/180;
      return new THREE.Vector3(
        -Math.sin(phi)*Math.cos(theta)*r,
         Math.cos(phi)*r,
         Math.sin(phi)*Math.sin(theta)*r
      );
    }
    const LAT=3.2163,LNG=101.7291;
    const mPos=latLngTo3D(LAT,LNG,1.012);
    // ① Glow halo (soft, larger, semi-transparent)
    const glowMesh=new THREE.Mesh(
      new THREE.SphereGeometry(0.042,16,16),
      new THREE.MeshBasicMaterial({color:0xff2200,transparent:true,opacity:0.18,depthWrite:false})
    );
    glowMesh.position.copy(mPos);
    group.add(glowMesh);
    // ② Core red dot
    const dotMesh=new THREE.Mesh(
      new THREE.SphereGeometry(0.020,16,16),
      new THREE.MeshBasicMaterial({color:0xff3333})
    );
    dotMesh.position.copy(mPos);
    dotMesh.userData={isMarker:true};
    group.add(dotMesh);
    // ③ Invisible hit sphere (easier to click)
    const hitMesh=new THREE.Mesh(
      new THREE.SphereGeometry(0.07,8,8),
      new THREE.MeshBasicMaterial({transparent:true,opacity:0,depthWrite:false})
    );
    hitMesh.position.copy(mPos);
    hitMesh.userData={isMarker:true};
    group.add(hitMesh);
    // ④ Pulse Sprites (always face camera, 2 rings phase-offset by 0.5)
    function makePulseSprite(phase){
      const pc=document.createElement('canvas');pc.width=128;pc.height=128;
      const px=pc.getContext('2d');
      px.strokeStyle='rgba(255,60,60,1)';px.lineWidth=5;
      px.beginPath();px.arc(64,64,52,0,Math.PI*2);px.stroke();
      const sp=new THREE.Sprite(
        new THREE.SpriteMaterial({map:new THREE.CanvasTexture(pc),transparent:true,depthTest:false})
      );
      sp.position.copy(mPos);
      sp.scale.set(0.09,0.09,1);
      sp.userData={isPulse:true,phase};

/* ══════════════════ INTRO SCREEN ════════════════════════════════ */
function IntroScreen({onDone}){
  const {setIntroReady}=useE();
  const [fading,setFading]=useState(false);
  function dismiss(){setFading(true);setIntroReady(true);setTimeout(onDone,900);}
  useEffect(()=>{const t=setTimeout(dismiss,8000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',inset:0,zIndex:1000,background:'#000',opacity:fading?0:1,transition:'opacity .9s ease',pointerEvents:fading?'none':'auto'}}>
      <video src={_V()} poster="city-overview.png" autoPlay muted playsInline preload="auto" onEnded={dismiss}
        style={{width:'100%',height:'100%',objectFit:'cover'}}/>
      <button onClick={dismiss} style={{position:'absolute',bottom:32,right:32,padding:'8px 24px',borderRadius:20,background:'rgba(255,255,255,0.12)',border:'1px solid rgba(255,255,255,0.28)',color:'#fff',fontSize:13,fontWeight:500,cursor:'pointer',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)',letterSpacing:'0.02em',transition:'background .2s'}}
        onMouseEnter={e=>e.target.style.background='rgba(255,255,255,0.22)'}
        onMouseLeave={e=>e.target.style.background='rgba(255,255,255,0.12)'}>
        Skip ›
      </button>
    </div>
  );
}

        <svg width="18" height="18" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,2 90,68 10,68" fill="rgba(0,229,220,0.92)"/>
          <polygon points="50,98 10,32 90,32" fill="rgba(0,200,255,0.85)"/>
          <polygon points="10,68 30,32 50,68" fill="rgba(0,210,120,0.9)"/>
          <polygon points="90,68 70,32 50,68" fill="rgba(230,0,200,0.85)"/>
        </svg>
      </button>
      {open&&(
        <div style={{width:340,background:'rgba(13,21,36,0.96)',border:'1px solid rgba(77,138,240,0.28)',borderRadius:12,boxShadow:'0 8px 28px rgba(0,0,0,0.55)',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)',padding:'4px 16px 12px',pointerEvents:'auto'}}>
          <div style={{display:'flex',justifyContent:'flex-end',marginTop:6}}>
            <button onClick={()=>setOpen(false)} style={{background:'transparent',border:'none',color:'rgba(255,255,255,0.55)',cursor:'pointer',fontSize:16,lineHeight:1,padding:2}}>×</button>
          </div>
          <AISuggestionPanel/>
        </div>
      )}
    </div>
  );
}

/* ══════════════════ RIGHT PANEL CONTAINER ═══════════════════════ */
// Separate component so it can call useE() to read ecTop (EProvider is its ancestor)
function RightPanel({panelVisible,panelKey,rpW}){
  const {ecTop}=useE();
  const rpWidth=useRpWidth();
  return(
    <div className="panel-scroll panel-enter-r rp-desktop" style={{
      position:'absolute',right:0,top:0,width:rpWidth||rpW,height:'100%',
      display:'flex',flexDirection:'column',gap:8,
      padding:`${ecTop}px 20px 20px`,
      overflowY:'auto',overflowX:'hidden',zIndex:5,
      transform:panelVisible?'translateX(0)':`translateX(${(rpW||rpWidth)+20}px)`,
      transition:'transform 0.4s cubic-bezier(0.4,0,0.2,1)',
      pointerEvents:panelVisible?'auto':'none',
    }}>
      <React.Fragment key={panelKey}>
        <CostAllocationCard/>
        <PerCapitaCostCard/>
        <SavingsVsLastMonthCard/>
        <OrgElectricityTrendCard/>
      </React.Fragment>
    </div>
  );
}

/* ══════════════════ RIGHT-SIDE DATA MODULES ═════════════════════ */
function SectionHeader({title}){
  return <div style={{height:40,display:'flex',alignItems:'center'}}><span style={{fontSize:16,fontWeight:600}}>{title}</span></div>;
}

// 1) Cost Allocation donut
function CostAllocationCard(){
  const {range}=useE();
  const ref=useRef(null);
  const data=RANGE_DATA[range].costAlloc.data;
  const totalLabel=RANGE_DATA[range].costAlloc.totalLabel;
  useEffect(()=>{
    if(!ref.current)return;
    const ch=new Chart(ref.current.getContext('2d'),{
      type:'doughnut',
      data:{labels:data.map(d=>d.k),datasets:[{data:data.map(d=>d.v),backgroundColor:data.map(d=>d.color),borderColor:'rgba(24,25,31,0.9)',borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'68%',
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#0d1829',borderColor:'rgba(255,255,255,.1)',borderWidth:1,titleColor:'#fff',bodyColor:'#94a3b8',callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw}%`}}},
        animation:{duration:800}},
    });
    return()=>ch.destroy();
  },[range]);
  return(
    <div className="pa5">
      <SectionHeader title="Cost Allocation"/>
      <div style={{background:'rgba(24,25,31,0.90)',borderRadius:10,padding:16,display:'flex',gap:14,alignItems:'center'}}>
        <div style={{position:'relative',width:120,height:120,flexShrink:0}}>
          <canvas ref={ref}/>
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
            <span style={{fontSize:10,color:'rgba(255,255,255,0.55)'}}>Total</span>
            <span style={{fontSize:14,fontWeight:600,color:'#fff'}}>{totalLabel}</span>
          </div>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:6}}>
          {data.map(d=>(
            <div key={d.k} style={{display:'flex',alignItems:'center',gap:6,fontSize:11}}>
              <span style={{width:8,height:8,borderRadius:2,background:d.color,flexShrink:0}}/>
              <span style={{color:'rgba(255,255,255,0.85)',flex:1}}>{d.k}</span>
              <span style={{color:'rgba(255,255,255,0.6)'}}>{d.v}%</span>
              <span style={{fontSize:9,padding:'1px 6px',borderRadius:8,color:d.color,border:`1px solid ${d.color}55`,background:`${d.color}15`}}>{d.status}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// 2) Per Capita Cost bars
function PerCapitaCostCard(){
  const {range}=useE();
  const pc=RANGE_DATA[range].perCapita;
  const {items,avg,max,avgLabel,benchmark}=pc;
  const avgPct=avg/max*100;
  const [ready,setReady]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setReady(true),60);return()=>clearTimeout(t);},[]);
  return(
    <div className="pa6">
      <SectionHeader title="Per Capita Cost"/>
      <div style={{background:'rgba(24,25,31,0.90)',borderRadius:10,padding:'14px 16px 12px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <span style={{fontSize:11,color:'rgba(255,255,255,0.55)'}}>Avg <span style={{color:'#fff',fontWeight:600}}>{avgLabel}</span></span>
          <span style={{fontSize:9,padding:'2px 8px',borderRadius:10,color:'#8098f6',border:'1px solid rgba(128,152,246,0.35)',background:'rgba(85,118,239,0.12)'}}>{benchmark}</span>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {items.map(d=>{
            const pct=d.v/max*100;
            const c='#5576ef';
            return(
              <div key={d.k} style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:11,color:'rgba(255,255,255,0.75)',width:52,flexShrink:0}}>{d.k}</span>
                <div style={{flex:1,position:'relative',height:6,borderRadius:3,background:'rgba(255,255,255,0.08)'}}>
                  <div style={{position:'absolute',left:0,top:0,height:'100%',width:ready?`${pct}%`:'0%',borderRadius:3,background:c,transition:'width .9s cubic-bezier(.4,0,.2,1)'}}/>
                  <div style={{position:'absolute',top:-3,bottom:-3,left:`${avgPct}%`,width:2,borderRadius:1,background:'rgba(255,255,255,0.35)'}}/>
                </div>
                <span style={{fontSize:11,fontWeight:600,color:c,width:36,textAlign:'right',flexShrink:0}}><AnimVal v={d.v}/></span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// 3) Savings vs Last Period bars (title/data switch by range)
function SavingsVsLastMonthCard(){
  const {range}=useE();
  const sv=RANGE_DATA[range].savingsVs;
  const {title,items,absMax,unit,pill}=sv;
  const [ready,setReady]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setReady(true),60);return()=>clearTimeout(t);},[]);
  return(
    <div className="pa7">
      <SectionHeader title={title}/>
      <div style={{background:'rgba(24,25,31,0.90)',borderRadius:10,padding:'14px 16px 12px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <span style={{fontSize:9,padding:'2px 8px',borderRadius:10,color:'#8098f6',border:'1px solid rgba(128,152,246,0.35)',background:'rgba(85,118,239,0.12)'}}>{pill}</span>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {items.map(d=>{
            const isNeg=d.v<0;
            const absV=Math.abs(d.v);
            const c='#5576ef';
            const halfPct=absV/absMax*50;
            return(
              <div key={d.k} style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:11,color:'rgba(255,255,255,0.75)',width:52,flexShrink:0}}>{d.k}</span>
                <div style={{flex:1,position:'relative',height:6,borderRadius:3,background:'rgba(255,255,255,0.08)'}}>
                  <div style={{position:'absolute',top:-3,bottom:-3,left:'50%',width:2,borderRadius:1,background:'rgba(255,255,255,0.35)',transform:'translateX(-50%)'}}/>
                  {isNeg
                    ?<div style={{position:'absolute',right:'50%',top:0,height:'100%',width:ready?`${halfPct}%`:'0%',borderRadius:'3px 0 0 3px',background:c,transition:'width .9s cubic-bezier(.4,0,.2,1)'}}/>
                    :<div style={{position:'absolute',left:'50%',top:0,height:'100%',width:ready?`${halfPct}%`:'0%',borderRadius:'0 3px 3px 0',background:c,transition:'width .9s cubic-bezier(.4,0,.2,1)'}}/>
                  }
                </div>
                <span style={{fontSize:11,fontWeight:600,color:c,width:42,textAlign:'right',flexShrink:0}}>
                  {isNeg?'-':'+'}<AnimVal v={absV} dec={Number.isInteger(d.v)?0:1}/>{unit}
                </span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// 4) Org Electricity Trend — labels & scale switch by range
function OrgElectricityTrendCard(){
  const {range}=useE();
  const ot=RANGE_DATA[range].orgTrend;
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    const {labels,base,axisUnit}=ot;
    const mk=(scale,shift)=>base.map((v,i)=>Math.round((v*scale+Math.sin(i/3+shift)*2)*10)/10);
    const series=[
      {label:'Admin',    color:'#5576ef',data:mk(1,0)},
      {label:'R&D',      color:'#22c55e',data:mk(0.85,1)},
      {label:'Ops',      color:'#f59e0b',data:mk(0.7,2)},
      {label:'Logistics',color:'#e879f9',data:mk(0.55,3)},
    ];
    const ch=new Chart(ref.current.getContext('2d'),{
      type:'line',
      plugins:[lineDrawPlugin],
      data:{labels,datasets:series.map(s=>({label:s.label,data:s.data,borderColor:s.color,borderWidth:1.6,pointRadius:0,pointHoverRadius:4,pointHoverBackgroundColor:s.color,pointHoverBorderColor:'#fff',tension:.35,fill:false}))},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#0d1829',borderColor:'rgba(255,255,255,.12)',borderWidth:1,titleColor:'#fff',bodyColor:'#94a3b8',callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw} ${axisUnit}`,labelColor:ctx=>{const c=ctx.dataset.borderColor;return{borderColor:c,backgroundColor:c,borderRadius:2};}}}},
        scales:{
          x:{grid:{color:'rgba(255,255,255,.06)',borderDash:[3,3]},ticks:{color:'#94a3b8',font:{size:9},maxTicksLimit:8},border:{display:false}},
          y:{grid:{color:'rgba(255,255,255,.06)',borderDash:[3,3]},ticks:{color:'#94a3b8',font:{size:10},maxTicksLimit:6,callback:v=>v+axisUnit},border:{display:false}},
        },
        animation:{duration:0}},
    });
    // line-draw animation (same as SavingsChart)
    ch._lineProgress=0;
    let raf2;
    const s0=performance.now(),dur=1500;
    function step2(now){
      const p=Math.min((now-s0)/dur,1);
      ch._lineProgress=p<0.5?2*p*p:-1+(4-2*p)*p;
      ch.draw();
      if(p<1)raf2=requestAnimationFrame(step2);
      else delete ch._lineProgress;
    }
    raf2=requestAnimationFrame(step2);
    return()=>{cancelAnimationFrame(raf2);ch.destroy();};
  },[range]);
  const legend=[['#5576ef','Admin'],['#22c55e','R&D'],['#f59e0b','Ops'],['#e879f9','Logistics']];
  return(
    <div className="pa8">
      <SectionHeader title={ot.title}/>
      <div style={{flex:1,minHeight:0,background:'rgba(24,25,31,0.90)',borderRadius:10,padding:16,display:'flex',flexDirection:'column'}}>
        <div style={{display:'flex',gap:14,flexWrap:'wrap',marginBottom:10,flexShrink:0}}>
          {legend.map(([c,l])=>(
            <div key={l} style={{display:'flex',alignItems:'center',gap:5}}>
              <div style={{width:8,height:8,borderRadius:2,background:c}}/>
              <span style={{fontSize:10,color:'var(--muted)'}}>{l}</span>
            </div>
          ))}
        </div>
        <div style={{flex:1,minHeight:120,position:'relative'}}><canvas ref={ref} style={{position:'absolute',inset:0,width:'100%',height:'100%'}}/></div>
      </div>
    </div>
  );
}
