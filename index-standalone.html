<script>
/* Minimal OrbitControls — no CDN dependency */
(function(){
  if(typeof THREE==='undefined') return;
  THREE.OrbitControls = function(camera, domEl){
    this.camera = camera;
    this.target = new THREE.Vector3(0,2,0);
    this.minDistance = 10; this.maxDistance = 28;
    this.minPolarAngle = Math.PI/6; this.maxPolarAngle = Math.PI/2.1;
    this.enablePan = false;
    var offset = camera.position.clone().sub(this.target);
    var sph = new THREE.Spherical().setFromVector3(offset);
    sph.phi = Math.max(Math.PI/6, Math.min(Math.PI/2.1, sph.phi));
    var dragging = false, lastX = 0, lastY = 0;
    var self = this;
    function onDown(e){ dragging=true; lastX=e.clientX; lastY=e.clientY; }
    function onUp(){ dragging=false; }
    function onMove(e){
      if(!dragging) return;
      sph.theta -= (e.clientX-lastX)*0.005;
      sph.phi   -= (e.clientY-lastY)*0.005;
      sph.phi = Math.max(self.minPolarAngle, Math.min(self.maxPolarAngle, sph.phi));
      lastX=e.clientX; lastY=e.clientY;
    }
    function onWheel(e){
      sph.radius += e.deltaY*0.015;
      sph.radius = Math.max(self.minDistance, Math.min(self.maxDistance, sph.radius));
    }
    domEl.addEventListener('mousedown',onDown);
    domEl.addEventListener('mouseup',onUp);
    domEl.addEventListener('mouseleave',onUp);
    domEl.addEventListener('mousemove',onMove);
    domEl.addEventListener('wheel',onWheel,{passive:true});
    this.update = function(){
      var pos = new THREE.Vector3().setFromSpherical(sph).add(self.target);
      camera.position.copy(pos);
      camera.lookAt(self.target);
    };
    this.dispose = function(){
      domEl.removeEventListener('mousedown',onDown);
      domEl.removeEventListener('mouseup',onUp);
      domEl.removeEventListener('mouseleave',onUp);
      domEl.removeEventListener('mousemove',onMove);
      domEl.removeEventListener('wheel',onWheel);
    };
  };
})();
</script>

<script type="text/babel">

/* ══════════════════ ENERGY CONTEXT ═════════════════════════════ */
const ECtx=createContext(null);
const useE=()=>useContext(ECtx);

function EProvider({children}){
  const [floors,setFloors]=useState(()=>FLOORS.map(f=>({...f,live:f.consumption,alert:false})));
  const [active,setActive]=useState(2);
  useEffect(()=>{
    const id=setInterval(()=>{
      setFloors(prev=>prev.map(f=>{

  ],
  'energy':"**Energy Analysis:**\n\nCurrent daily consumption is **335 kWh**, with peak usage between 10:00–14:00. After applying AI optimization:\n\n• HVAC: –18% savings\n• Lighting: –12% savings\n• Equipment: –9% savings\n\nProjected monthly savings: **$4,300** and **135 kg CO₂** reduction.",

  'alert':"**Active Alerts:**\n\n🔴 Floor 14F: Energy consumption 332 kWh — **38% above average**\n🟡 Floor 15F: Ventilation efficiency dropping\n🟢 Floors 11F–13F: All within normal range\n\nWould you like me to auto-apply corrections?",
  'optimize':"I'll initiate the optimization sequence now.\n\n**Applying changes:**\n• Floor 14F: Reducing HVAC by 25% during 22:00–06:00 ✓\n• Floor 15F: Adjusting ventilation schedule ✓\n• Floor 16F: Enabling occupancy-based lighting ✓\n\nEstimated impact: **–$1,200/month** in savings. Changes will take effect within 15 minutes.",
  'report':"**Weekly Summary Report:**\n\n📊 Total consumption: **1,437 kWh**\n📈 vs last week: –8.3%\n💰 Cost savings: **$2,400**\n🌿 CO₂ reduced: **89 kg**\n\nTop performer: **Floor 11F** (–24% vs baseline)\nNeeds attention: **Floor 14F** (overuse pattern detected)\n\nFull report exported to dashboard.",
};
const QUICK_PROMPTS=[
  {label:'⚡ Energy status',key:'energy'},
  {label:'🏢 Floor 11F details',key:'floor'},
  {label:'🔔 Check alerts',key:'alert'},
  {label:'🤖 Auto-optimize',key:'optimize'},
  {label:'📊 Weekly report',key:'report'},
];
function AIChatPanel({onClose}){
  const [msgs,setMsgs]=useState([
    {role:'assistant',text:"Hello! I'm your **Smart City AI Assistant**.\n\nI'm monitoring **7 floors** in real-time and have detected optimization opportunities that could save up to **25% energy**.\n\nHow can I help you today?",ts:Date.now()-60000},
  ]);
  const [input,setInput]=useState('');
  const [typing,setTyping]=useState(false);
  const bottomRef=useRef(null);
  const inputRef=useRef(null);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[msgs,typing]);
  function sendMsg(text){
    const t=text.trim();
    if(!t||typing) return;
    setMsgs(prev=>[...prev,{role:'user',text:t,ts:Date.now()}]);
    setInput('');
    setTyping(true);
    const lower=t.toLowerCase();
    let reply=AI_REPLIES.default[Math.floor(Math.random()*AI_REPLIES.default.length)];
    if(lower.includes('energy')||lower.includes('consumption')||lower.includes('kw')) reply=AI_REPLIES.energy;
    else if(lower.includes('floor')||lower.includes('11f')||lower.includes('14f')) reply=AI_REPLIES.floor;
    else if(lower.includes('alert')||lower.includes('warning')||lower.includes('alarm')) reply=AI_REPLIES.alert;
    else if(lower.includes('optim')||lower.includes('apply')||lower.includes('fix')) reply=AI_REPLIES.optimize;
    else if(lower.includes('report')||lower.includes('summary')||lower.includes('week')) reply=AI_REPLIES.report;
    setTimeout(()=>{
      setTyping(false);
      setMsgs(prev=>[...prev,{role:'assistant',text:reply,ts:Date.now()}]);
    },1200+Math.random()*800);
  }
  function renderText(t){
    return t.split('\n').map((line,i)=>{
      const parts=line.split(/(\*\*[^*]+\*\*)/g);
      return <span key={i}>{parts.map((p,j)=>p.startsWith('**')&&p.endsWith('**')?<strong key={j}>{p.slice(2,-2)}</strong>:<span key={j}>{p}</span>)}{i<t.split('\n').length-1&&<br/>}</span>;
    });
  }
  function fmtTime(ts){const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
  return(
    <div style={{position:'absolute',right:0,top:0,width:360,height:'100%',display:'flex',flexDirection:'column',background:'rgba(7,11,22,0.92)',backdropFilter:'blur(24px)',WebkitBackdropFilter:'blur(24px)',borderLeft:'1px solid rgba(99,102,241,0.25)',zIndex:20,animation:'slideInR .25s both'}}>
      {/* Header */}

        <div style={{width:34,height:34,borderRadius:10,background:'linear-gradient(135deg,#6366f1,#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 16px rgba(99,102,241,0.5)'}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="white" opacity="0.9"/></svg>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:'#e2e8f0'}}>City AI Assistant</div>
          <div style={{display:'flex',alignItems:'center',gap:5,marginTop:1}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:'#22c55e',boxShadow:'0 0 6px #22c55e'}}/>
            <span style={{fontSize:10,color:'#64748b'}}>Online · Smart City v2.1</span>
          </div>
        </div>
        <button onClick={onClose} style={{width:28,height:28,borderRadius:8,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',color:'#64748b',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,lineHeight:1}}>✕</button>
      </div>
      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'14px 14px 8px',display:'flex',flexDirection:'column',gap:12}}>

          <div key={i} style={{display:'flex',flexDirection:'column',alignItems:m.role==='user'?'flex-end':'flex-start',gap:4}}>
            {m.role==='assistant'&&(

            </div>
            <span style={{fontSize:9,color:'#334155',marginTop:1}}>{fmtTime(m.ts)}</span>
          </div>
        ))}
        {typing&&(
          <div style={{display:'flex',alignItems:'flex-start',gap:6}}>
            <div style={{width:20,height:20,borderRadius:6,background:'linear-gradient(135deg,#6366f1,#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:2}}>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
            </div>
            <div style={{padding:'12px 14px',borderRadius:'14px 14px 14px 4px',background:'rgba(30,41,59,0.9)',border:'1px solid rgba(99,102,241,0.2)',display:'flex',gap:5,alignItems:'center'}}>

                <div key={j} style={{width:6,height:6,borderRadius:'50%',background:'#6366f1',animation:`typingDot 1.2s ${j*0.2}s infinite ease-in-out`}}/>
              ))}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      {/* Quick prompts */}
      <div style={{padding:'8px 14px',display:'flex',gap:6,overflowX:'auto',flexShrink:0,borderTop:'1px solid rgba(255,255,255,0.05)'}}>

            onMouseEnter={e=>e.target.style.background='rgba(99,102,241,0.25)'}
            onMouseLeave={e=>e.target.style.background='rgba(99,102,241,0.12)'}>
            {p.label}

      </div>
      {/* Input */}

  );

/* ══════════════════ 3D BUILDING ═════════════════════════════════ */
function Building3D({aiOpen=false}){
  const mountRef=useRef(null);
  const stRef=useRef({active:14,floors:FLOORS.map(f=>({...f,live:f.consumption,alert:false}))});
  const tipRef=useRef(null);
  const aiOpenRef=useRef(aiOpen);
  const {setActive:setCtxActive,floors:ctxFloors,active:ctxActive}=useE();

  useEffect(()=>{aiOpenRef.current=aiOpen;},[aiOpen]);
  useEffect(()=>{stRef.current.floors=ctxFloors;stRef.current.active=ctxActive;},[ctxFloors,ctxActive]);

  useEffect(()=>{
    const el=mountRef.current;
    if(!el) return;
    const W=el.clientWidth,H=el.clientHeight;

    const scene=new THREE.Scene();
    scene.fog=new THREE.FogExp2(0x070d1a,0.035);

    const camera=new THREE.PerspectiveCamera(42,W/H,0.1,200);
    camera.position.set(12,8,12);
    camera.lookAt(0,2,0);

    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setSize(W,H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    el.appendChild(renderer.domElement);

    // Lights — holographic blue-white glow matching reference
    scene.add(new THREE.AmbientLight(0x6688bb,4));
    const dl=new THREE.DirectionalLight(0xbbddff,3);dl.position.set(5,14,5);scene.add(dl);
    const dl2=new THREE.DirectionalLight(0x99bbff,1.8);dl2.position.set(-5,10,-3);scene.add(dl2);
    const pl=new THREE.PointLight(0x4499ff,8,22);pl.position.set(0,8,0);scene.add(pl);
    const gl=new THREE.PointLight(0x22c55e,5,14);gl.position.set(0,3,0);scene.add(gl);
    const rim=new THREE.PointLight(0xaaccff,4,18);rim.position.set(-6,6,-4);scene.add(rim);

    // OrbitControls
    const ctrl=new THREE.OrbitControls(camera,renderer.domElement);
    ctrl.enablePan=false;ctrl.minPolarAngle=Math.PI/6;ctrl.maxPolarAngle=Math.PI/2.1;
    ctrl.minDistance=10;ctrl.maxDistance=28;ctrl.target.set(0,2,0);ctrl.update();

    // Floors — holographic translucent panels with edge grid lines
    const FH=0.55,FG=0.06,FW=4.2,FD=2.8;
    const meshes=[];
    FLOORS.forEach((f,i)=>{
      const mat=new THREE.MeshStandardMaterial({
        color:f.hl?0x0d3d20:0x1a3870,
        emissive:f.hl?0x22c55e:0x5599ee,
        emissiveIntensity:f.hl?2.2:0.55,
        transparent:true,opacity:f.hl?0.92:0.78,
        roughness:0.08,metalness:0.65,
      });
      const geo=new THREE.BoxGeometry(FW,FH,FD);
      const mesh=new THREE.Mesh(geo,mat);
      mesh.position.set(0,i*(FH+FG)+FH/2,0);
      mesh.userData={id:f.id,hl:f.hl};
      scene.add(mesh);meshes.push(mesh);
      // Edge lines — window grid effect
      const edges=new THREE.LineSegments(
        new THREE.EdgesGeometry(geo),
        new THREE.LineBasicMaterial({color:f.hl?0x55ffaa:0x88ccff,transparent:true,opacity:f.hl?0.9:0.5})
      );
      edges.position.copy(mesh.position);
      scene.add(edges);
    });

    // Base
    const bm=new THREE.MeshStandardMaterial({color:0x060f1e,metalness:.5,roughness:.4});
    const ob=new THREE.MeshStandardMaterial({color:0x040a14,metalness:.6,roughness:.5});
    const b1=new THREE.Mesh(new THREE.BoxGeometry(5.5,.3,3.8),bm);b1.position.y=-.15;scene.add(b1);
    const b2=new THREE.Mesh(new THREE.BoxGeometry(7,.1,5.5),ob);b2.position.y=-.32;scene.add(b2);
    const grid=new THREE.GridHelper(8,20,0x112244,0x0d1a33);grid.position.y=-.27;scene.add(grid);

    // Scan rings
    const rm1=new THREE.MeshBasicMaterial({color:0x3b82f6,transparent:true,opacity:.35,side:THREE.DoubleSide});
    const rm2=new THREE.MeshBasicMaterial({color:0x3b82f6,transparent:true,opacity:.15,side:THREE.DoubleSide});
    const r1=new THREE.Mesh(new THREE.RingGeometry(2.2,2.5,64),rm1);r1.rotation.x=-Math.PI/2;r1.position.y=-.02;scene.add(r1);
    const r2=new THREE.Mesh(new THREE.RingGeometry(3.0,3.2,64),rm2);r2.rotation.x=-Math.PI/2;r2.position.y=-.02;scene.add(r2);

    // Raycaster
    const rc=new THREE.Raycaster();const mouse=new THREE.Vector2();
    let hovId=null;
    function onMove(e){
      const rect=renderer.domElement.getBoundingClientRect();
      mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
      mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
      rc.setFromCamera(mouse,camera);
      const hits=rc.intersectObjects(meshes);
      if(hits.length){
        const id=hits[0].object.userData.id;
        if(id!==hovId){hovId=id;setCtxActive(id);stRef.current.active=id;renderer.domElement.style.cursor='pointer';}
      }else{hovId=null;renderer.domElement.style.cursor='default';}
    }
    renderer.domElement.addEventListener('mousemove',onMove);

    // Animate
    let aid;
    function animate(){
      aid=requestAnimationFrame(animate);
      const t=Date.now()*.001;
      const {active,floors}=stRef.current;
      meshes.forEach(m=>{
        const f=floors.find(x=>x.id===m.userData.id);
        const mat=m.material;
        if(f?.alert){mat.emissive.setHex(0xef4444);mat.emissiveIntensity=1.2+Math.sin(t*5)*.8;}
        else if(m.userData.hl){mat.emissive.setHex(0x22c55e);mat.emissiveIntensity=1.2+Math.sin(t*2)*.4;}
        else if(m.userData.id===active){mat.emissive.setHex(0x6699ff);mat.emissiveIntensity=Math.min(mat.emissiveIntensity+.06,.9);}
        else{mat.emissive.setHex(0x3b82f6);mat.emissiveIntensity=Math.max(mat.emissiveIntensity-.04,.25);}
      });
      r1.rotation.z=t*.5;r2.rotation.z=-t*.3;
      rm1.opacity=.25+Math.sin(t*1.5)*.12;rm2.opacity=(.25+Math.sin(t*1.5)*.12)*.5;

      // Tooltip positioning
      if(tipRef.current){
        const {active:af}=stRef.current;
        const idx=FLOORS.findIndex(f=>f.id===af);
        if(idx>=0){
          const pos=new THREE.Vector3(-2,idx*(FH+FG)+FH/2+.4,2);
          pos.project(camera);
          const rect=renderer.domElement.getBoundingClientRect();
          const tx=(pos.x*.5+.5)*rect.width;
          const ty=(-pos.y*.5+.5)*rect.height;
          tipRef.current.style.left=`${Math.max(10,Math.min(tx+15,rect.width-200))}px`;
          tipRef.current.style.top=`${Math.max(10,Math.min(ty-70,rect.height-140))}px`;
          tipRef.current.style.display='block';
        }
      }
      // Smoothly center building in available area
      // Left panel=400px always, AI panel=360px when open → offset=(leftW-rightW)/2
      const targetOff=aiOpenRef.current?-20:-200;
      curOff+=(targetOff-curOff)*0.08;
      camera.setViewOffset(renderer.domElement.width,renderer.domElement.height,curOff,0,renderer.domElement.width,renderer.domElement.height);

      ctrl.update();renderer.render(scene,camera);
    }
    let curOff=-200;
    animate();

    function onResize(){
      const w=el.clientWidth,h=el.clientHeight;
      camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);
    }
    window.addEventListener('resize',onResize);
    return()=>{
      cancelAnimationFrame(aid);window.removeEventListener('resize',onResize);
      renderer.domElement.removeEventListener('mousemove',onMove);
      renderer.dispose();if(el.contains(renderer.domElement))el.removeChild(renderer.domElement);
    };
  },[]);

  const {floors,active}=useE();
  const af=floors.find(f=>f.id===active);
  const sp=af?Math.max(0,Math.round((1-af.optimized/af.live)*100)):25;

  return(
    <div ref={mountRef} style={{width:'100%',height:'100%',position:'relative'}}>
      <div ref={tipRef} style={{position:'absolute',display:'none',pointerEvents:'none',zIndex:20,background:'rgba(10,20,40,.95)',border:'1px solid rgba(255,255,255,.12)',borderRadius:10,padding:'12px 14px',minWidth:180,boxShadow:'0 8px 32px rgba(0,0,0,.5)'}}>
        {af&&<>
          <p style={{fontSize:14,fontWeight:700,marginBottom:8}}>{af.label}</p>
          <p style={{fontSize:11,color:'var(--muted)',marginBottom:2}}>Current consumption</p>
          <p style={{fontSize:16,fontWeight:700,marginBottom:8}}>{af.live} <span style={{fontSize:11,fontWeight:400}}>kWh</span></p>
          <p style={{fontSize:11,color:'var(--muted)',marginBottom:2}}>After optimization</p>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:15,fontWeight:700,color:'var(--primary)'}}>{af.optimized} <span style={{fontSize:11,fontWeight:400,color:'var(--primary)'}}>kWh</span></span>
            <span className="badge-green">+{sp}% <span className="dot"/></span>
          </div>
        </>}
      </div>
    </div>
  );
}

/* ══════════════════ GLOBE 3D ════════════════════════════════════ */
function Globe3D({onClose}){
  const mountRef=useRef(null);
  useEffect(()=>{
    const el=mountRef.current;if(!el)return;
    const W=el.clientWidth,H=el.clientHeight;
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(40,W/H,0.1,100);
    camera.position.set(0,0,3.2);
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(W,H);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    el.appendChild(renderer.domElement);

    const group=new THREE.Group();scene.add(group);

    // Globe body
    group.add(new THREE.Mesh(new THREE.SphereGeometry(1,64,64),
      new THREE.MeshPhongMaterial({color:0x0d2a5a,emissive:0x050f20,shininess:60})));
    // Wireframe
    group.add(new THREE.Mesh(new THREE.SphereGeometry(1.002,28,28),
      new THREE.MeshBasicMaterial({color:0x2266cc,wireframe:true,transparent:true,opacity:0.15})));
    // Atmosphere glow
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.15,32,32),
      new THREE.MeshBasicMaterial({color:0x1a44aa,transparent:true,opacity:0.08,side:THREE.BackSide})));

    // Longitude meridians
    for(let i=0;i<12;i++){
      const pts=[];for(let j=0;j<=64;j++){const a=j/64*Math.PI*2;pts.push(new THREE.Vector3(Math.cos(a),Math.sin(a),0));}
      const l=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({color:0x3388ff,transparent:true,opacity:0.22}));
      l.rotation.y=i*Math.PI/6;group.add(l);
    }
    // Latitude parallels
    [-60,-30,0,30,60].forEach(lat=>{
      const r=Math.cos(lat*Math.PI/180),y=Math.sin(lat*Math.PI/180);
      const pts=[];for(let i=0;i<=128;i++){const a=i/128*Math.PI*2;pts.push(new THREE.Vector3(r*Math.cos(a),y,r*Math.sin(a)));}
      group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({color:0x3388ff,transparent:true,opacity:lat===0?.38:.2})));
    });

    // Lights
    scene.add(new THREE.AmbientLight(0x334466,3));
    const dl=new THREE.DirectionalLight(0x88ccff,4);dl.position.set(4,3,4);scene.add(dl);
    const rl=new THREE.PointLight(0x2244aa,3,8);rl.position.set(-3,1,-2);scene.add(rl);

    // Drag
    let drag=false,lx=0,ly=0,ry=0,rx=0;
    const d=renderer.domElement;
    function dn(e){drag=true;lx=e.clientX;ly=e.clientY;}
    function up(){drag=false;}
    function mv(e){if(!drag)return;ry+=(e.clientX-lx)*.005;rx+=(e.clientY-ly)*.005;rx=Math.max(-1.1,Math.min(1.1,rx));lx=e.clientX;ly=e.clientY;}
    d.addEventListener('mousedown',dn);d.addEventListener('mouseup',up);d.addEventListener('mouseleave',up);d.addEventListener('mousemove',mv);

    let aid;
    function animate(){
      aid=requestAnimationFrame(animate);
      if(!drag)ry+=.003;
      group.rotation.y=ry;group.rotation.x=rx;
      renderer.render(scene,camera);
    }
    animate();

    function onR(){const w=el.clientWidth,h=el.clientHeight;camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);}
    window.addEventListener('resize',onR);
    return()=>{cancelAnimationFrame(aid);window.removeEventListener('resize',onR);d.removeEventListener('mousedown',dn);d.removeEventListener('mouseup',up);d.removeEventListener('mouseleave',up);d.removeEventListener('mousemove',mv);renderer.dispose();if(el.contains(d))el.removeChild(d);};
  },[]);

  return(
    <div ref={mountRef} style={{position:'fixed',inset:0,zIndex:100,background:'radial-gradient(ellipse at center,#061028 0%,#020810 100%)'}}>
      <div style={{position:'absolute',top:20,left:'50%',transform:'translateX(-50%)',fontSize:12,fontWeight:600,color:'rgba(68,153,255,0.6)',letterSpacing:'0.15em',pointerEvents:'none',textTransform:'uppercase'}}>3D Globe View</div>
      <div style={{position:'absolute',bottom:20,right:20,zIndex:101,display:'flex',flexDirection:'column',gap:12}}>
        <button onClick={onClose} style={{width:44,height:32,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:6,background:'rgba(59,130,246,0.25)',border:'1px solid rgba(59,130,246,0.55)',color:'#93c5fd',fontSize:11,fontWeight:700,cursor:'pointer'}}>2D</button>
      </div>
    </div>
  );
}

function BuildingView({aiOpen=false,onToggle3D}){
  const [tab,setTab]=useState('Building');
  const [bFloor,setBFloor]=useState(1);
  const isBuilding=tab==='Floor';
  return(
    <div style={{position:'absolute',inset:0}}>
      <div style={{position:'absolute',top:16,left:'50%',transform:'translateX(-50%)',display:'flex',gap:4,zIndex:10,background:'rgba(13,24,41,.85)',border:'1px solid var(--border)',borderRadius:8,padding:4}}>
        {['Campus','Building','Floor','Zone'].map(t=>{const a=t===tab;return(
          <button key={t} onClick={()=>setTab(t)} style={{padding:'5px 16px',borderRadius:5,fontSize:12,fontWeight:a?600:400,color:a?'#0d1829':'var(--muted)',background:a?'rgba(255,255,255,0.92)':'transparent',border:'none',cursor:'pointer'}}>{t}</button>
        );})}
      </div>
      {isBuilding?(
        <>
          <Building3D aiOpen={aiOpen}/>
          <FloorSelector/>
        </>
      ):(
        <div style={{position:'absolute',inset:0}}>
          {tab==='Campus'?(
            <video key="city-video" src="city-view.mp4" autoPlay loop muted playsInline style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center'}}/>
          ):(
            <img src={tab==='Building'?`building3d-l${bFloor}.png`:VIEW_IMGS[tab]} alt={tab} onError={e=>{e.target.onerror=null;e.target.src='building3d-mm.png';}} style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center'}}/>
          )}
          <div style={{position:'absolute',inset:0,background:'rgba(7,13,26,.15)'}}/>
          {tab==='Building'&&(<>
            <div style={{position:'absolute',top:'28%',left:'50%',transform:'translateX(-50%)',background:'rgba(8,16,36,0.82)',border:'1px solid rgba(255,255,255,0.18)',borderRadius:14,padding:'10px 28px',fontSize:16,fontWeight:500,color:'#fff',whiteSpace:'nowrap',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',pointerEvents:'none',zIndex:10,letterSpacing:'0.01em',boxShadow:'0 4px 24px rgba(0,0,0,0.45)'}}>
              Main Hospital Building
            </div>
            <div style={{position:'absolute',left:420,top:'50%',transform:'translateY(-50%)',display:'flex',flexDirection:'column',gap:8,zIndex:10}}>
              {[1,2,3,4,5,6,7].map(f=>(
                <button key={f} onClick={()=>setBFloor(f)} style={{background:'none',border:'none',cursor:'pointer',fontSize:11,fontWeight:bFloor===f?700:400,color:bFloor===f?'var(--green)':'var(--muted)',padding:'2px 4px',transition:'color .15s'}}>{f}F</button>
              ))}
            </div>
          </>)}
        </div>
      )}
      <MapControls onToggle3D={onToggle3D}/>
    </div>
  );
}

/* ══════════════════ INTRO SCREEN ════════════════════════════════ */
function IntroScreen({onDone}){
  const [fading,setFading]=useState(false);
  function dismiss(){setFading(true);setTimeout(onDone,600);}
  useEffect(()=>{const t=setTimeout(dismiss,8000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',inset:0,zIndex:1000,background:'#000',opacity:fading?0:1,transition:'opacity .6s ease',pointerEvents:fading?'none':'auto'}}>
      <video src="city-view.mp4" poster="city-view.jpg" autoPlay muted playsInline preload="auto" onEnded={dismiss}
        style={{width:'100%',height:'100%',objectFit:'cover'}}/>
      <button onClick={dismiss} style={{position:'absolute',bottom:32,right:32,padding:'8px 24px',borderRadius:20,background:'rgba(255,255,255,0.12)',border:'1px solid rgba(255,255,255,0.28)',color:'#fff',fontSize:13,fontWeight:500,cursor:'pointer',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)',letterSpacing:'0.02em',transition:'background .2s'}}
        onMouseEnter={e=>e.target.style.background='rgba(255,255,255,0.22)'}
        onMouseLeave={e=>e.target.style.background='rgba(255,255,255,0.12)'}>
        Skip ›
      </button>
    </div>
  );
}

/* ══════════════════ APP ══════════════════════════════════════════ */
function App(){
  const [intro,setIntro]=useState(true);
  const [show3D,setShow3D]=useState(false);
  return(
    <EProvider>
      {intro&&<IntroScreen onDone={()=>setIntro(false)}/>}
      {show3D&&<Globe3D onClose={()=>setShow3D(false)}/>}
      <div style={{position:'relative',height:'100vh',overflow:'hidden'}}>
        <BuildingView onToggle3D={()=>setShow3D(true)}/>
        <div style={{position:'absolute',left:0,top:0,width:400,height:'100%',display:'flex',flexDirection:'column',gap:8,padding:12,overflowY:'auto',zIndex:5}}>
          <AISuggestionPanel/>
          <EnergyChart/>
          <StatsCards/>
          <SavingsChart/>
        </div>
        <a href="http://test.hokoemc.com:8060/login?redirect=/power/electricChart" target="_blank" rel="noopener noreferrer"
          style={{position:'absolute',top:16,right:16,zIndex:50,width:36,height:36,borderRadius:18,background:'linear-gradient(135deg,rgba(143,231,163,0.12) 0%,rgba(23,204,200,0.12) 100%)',border:'1px solid rgba(255,255,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 8px rgba(0,0,0,0.4)',cursor:'pointer',textDecoration:'none',transition:'box-shadow .2s'}}
          onMouseEnter={e=>e.currentTarget.style.boxShadow='0 0 14px rgba(23,204,200,0.5)'}
          onMouseLeave={e=>e.currentTarget.style.boxShadow='0 2px 8px rgba(0,0,0,0.4)'}>
          <img src="app-icon.png" alt="Smart City Platform" style={{width:24,height:24,objectFit:'contain'}}/>
        </a>
      </div>
    </EProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
