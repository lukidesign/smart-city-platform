<script>
/* Minimal OrbitControls — no CDN dependency */
(function(){
  if(typeof THREE==='undefined') return;
  THREE.OrbitControls = function(camera, domEl){
    this.camera = camera;
    this.target = new THREE.Vector3(0,2,0);
    this.minDistance = 10; this.maxDistance = 28;
    this.minPolarAngle = Math.PI/6; this.maxPolarAngle = Math.PI/2.1;
    this.enablePan = false;
    var offset = camera.position.clone().sub(this.target);
    var sph = new THREE.Spherical().setFromVector3(offset);
    sph.phi = Math.max(Math.PI/6, Math.min(Math.PI/2.1, sph.phi));
    var dragging = false, lastX = 0, lastY = 0;
    var self = this;
    function onDown(e){ dragging=true; lastX=e.clientX; lastY=e.clientY; }
    function onUp(){ dragging=false; }
    function onMove(e){
      if(!dragging) return;
      sph.theta -= (e.clientX-lastX)*0.005;
      sph.phi   -= (e.clientY-lastY)*0.005;
      sph.phi = Math.max(self.minPolarAngle, Math.min(self.maxPolarAngle, sph.phi));
      lastX=e.clientX; lastY=e.clientY;
    }
    function onWheel(e){
      sph.radius += e.deltaY*0.015;
      sph.radius = Math.max(self.minDistance, Math.min(self.maxDistance, sph.radius));
    }
    domEl.addEventListener('mousedown',onDown);
    domEl.addEventListener('mouseup',onUp);
    domEl.addEventListener('mouseleave',onUp);
    domEl.addEventListener('mousemove',onMove);
    domEl.addEventListener('wheel',onWheel,{passive:true});
    this.update = function(){
      var pos = new THREE.Vector3().setFromSpherical(sph).add(self.target);
      camera.position.copy(pos);
      camera.lookAt(self.target);
    };
    this.dispose = function(){
      domEl.removeEventListener('mousedown',onDown);
      domEl.removeEventListener('mouseup',onUp);
      domEl.removeEventListener('mouseleave',onUp);
      domEl.removeEventListener('mousemove',onMove);
      domEl.removeEventListener('wheel',onWheel);
    };
  };
})();
</script>

const ECtx=createContext(null);

function EProvider({children}){
  const [floors,setFloors]=useState(()=>FLOORS.map(f=>({...f,live:f.consumption,alert:false})));

  {label:'🔔 Check alerts',key:'alert'},
  {label:'🤖 Auto-optimize',key:'optimize'},

function AIChatPanel({onClose}){
  const [msgs,setMsgs]=useState([
    {role:'assistant',text:"Hello! I'm your **Smart City AI Assistant**.\n\nI'm monitoring **7 floors** in real-time and have detected optimization opportunities that could save up to **25% energy**.\n\nHow can I help you today?",ts:Date.now()-60000},

  const [typing,setTyping]=useState(false);
  const bottomRef=useRef(null);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[msgs,typing]);

    const t=text.trim();
    if(!t||typing) return;
    setMsgs(prev=>[...prev,{role:'user',text:t,ts:Date.now()}]);
    setInput('');
    setTyping(true);
    const lower=t.toLowerCase();
    let reply=AI_REPLIES.default[Math.floor(Math.random()*AI_REPLIES.default.length)];
    if(lower.includes('energy')||lower.includes('consumption')||lower.includes('kw')) reply=AI_REPLIES.energy;
    else if(lower.includes('floor')||lower.includes('11f')||lower.includes('14f')) reply=AI_REPLIES.floor;
    else if(lower.includes('alert')||lower.includes('warning')||lower.includes('alarm')) reply=AI_REPLIES.alert;
    else if(lower.includes('optim')||lower.includes('apply')||lower.includes('fix')) reply=AI_REPLIES.optimize;
    else if(lower.includes('report')||lower.includes('summary')||lower.includes('week')) reply=AI_REPLIES.report;

      setMsgs(prev=>[...prev,{role:'assistant',text:reply,ts:Date.now()}]);

    });

    <div style={{position:'absolute',right:0,top:0,width:360,height:'100%',display:'flex',flexDirection:'column',background:'rgba(7,11,22,0.92)',backdropFilter:'blur(24px)',WebkitBackdropFilter:'blur(24px)',borderLeft:'1px solid rgba(99,102,241,0.25)',zIndex:20,animation:'slideInR .25s both'}}>

  );

/* ══════════════════ 3D BUILDING ═════════════════════════════════ */
function Building3D({aiOpen=false}){
  const mountRef=useRef(null);
  const stRef=useRef({active:14,floors:FLOORS.map(f=>({...f,live:f.consumption,alert:false}))});
  const tipRef=useRef(null);
  const aiOpenRef=useRef(aiOpen);
  const {setActive:setCtxActive,floors:ctxFloors,active:ctxActive}=useE();

  useEffect(()=>{aiOpenRef.current=aiOpen;},[aiOpen]);
  useEffect(()=>{stRef.current.floors=ctxFloors;stRef.current.active=ctxActive;},[ctxFloors,ctxActive]);

  useEffect(()=>{
    const el=mountRef.current;
    if(!el) return;
    const W=el.clientWidth,H=el.clientHeight;

    const scene=new THREE.Scene();
    scene.fog=new THREE.FogExp2(0x070d1a,0.035);

    const camera=new THREE.PerspectiveCamera(42,W/H,0.1,200);
    camera.position.set(12,8,12);
    camera.lookAt(0,2,0);

    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setSize(W,H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    el.appendChild(renderer.domElement);

    // Lights — bright white-blue holographic matching reference
    scene.add(new THREE.AmbientLight(0xc8e0ff,7));
    const dl=new THREE.DirectionalLight(0xffffff,5);dl.position.set(5,14,5);scene.add(dl);
    const dl2=new THREE.DirectionalLight(0xddeeff,3);dl2.position.set(-5,10,-3);scene.add(dl2);
    const pl=new THREE.PointLight(0x88bbff,12,28);pl.position.set(0,8,0);scene.add(pl);
    const gl=new THREE.PointLight(0x22c55e,6,16);gl.position.set(0,3,0);scene.add(gl);
    const rim=new THREE.PointLight(0xffffff,5,20);rim.position.set(-6,6,-4);scene.add(rim);

    // OrbitControls
    const ctrl=new THREE.OrbitControls(camera,renderer.domElement);
    ctrl.enablePan=false;ctrl.minPolarAngle=Math.PI/6;ctrl.maxPolarAngle=Math.PI/2.1;
    ctrl.minDistance=10;ctrl.maxDistance=28;ctrl.target.set(0,2,0);ctrl.update();

    // Floors — holographic translucent panels with edge grid lines
    const FH=0.55,FG=0.06,FW=4.2,FD=2.8;
    const meshes=[];
    FLOORS.forEach((f,i)=>{
      const mat=new THREE.MeshStandardMaterial({
        color:0x0d1e3a,
        emissive:0x1a3a6e,
        emissiveIntensity:0.6,
        transparent:true,opacity:0.88,
        roughness:0.15,metalness:0.45,
      });
      const geo=new THREE.BoxGeometry(FW,FH,FD);
      const mesh=new THREE.Mesh(geo,mat);
      mesh.position.set(0,i*(FH+FG)+FH/2,0);
      mesh.userData={id:f.id,hl:f.hl};
      scene.add(mesh);meshes.push(mesh);
      // Edge lines — window grid effect
      const edges=new THREE.LineSegments(
        new THREE.EdgesGeometry(geo),
        new THREE.LineBasicMaterial({color:0x2255aa,transparent:true,opacity:0.7})
      );
      edges.position.copy(mesh.position);
      scene.add(edges);
    });

    // Base
    const bm=new THREE.MeshStandardMaterial({color:0x060f1e,metalness:.5,roughness:.4});
    const ob=new THREE.MeshStandardMaterial({color:0x040a14,metalness:.6,roughness:.5});
    const b1=new THREE.Mesh(new THREE.BoxGeometry(5.5,.3,3.8),bm);b1.position.y=-.15;scene.add(b1);
    const b2=new THREE.Mesh(new THREE.BoxGeometry(7,.1,5.5),ob);b2.position.y=-.32;scene.add(b2);
    const grid=new THREE.GridHelper(8,20,0x112244,0x0d1a33);grid.position.y=-.27;scene.add(grid);

    // Scan rings
    const rm1=new THREE.MeshBasicMaterial({color:0x4d8af0,transparent:true,opacity:.35,side:THREE.DoubleSide});
    const rm2=new THREE.MeshBasicMaterial({color:0x4d8af0,transparent:true,opacity:.15,side:THREE.DoubleSide});
    const r1=new THREE.Mesh(new THREE.RingGeometry(2.2,2.5,64),rm1);r1.rotation.x=-Math.PI/2;r1.position.y=-.02;scene.add(r1);
    const r2=new THREE.Mesh(new THREE.RingGeometry(3.0,3.2,64),rm2);r2.rotation.x=-Math.PI/2;r2.position.y=-.02;scene.add(r2);

    // Raycaster
    const rc=new THREE.Raycaster();const mouse=new THREE.Vector2();
    let hovId=null;
    function onMove(e){
      const rect=renderer.domElement.getBoundingClientRect();
      mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
      mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
      rc.setFromCamera(mouse,camera);
      const hits=rc.intersectObjects(meshes);
      if(hits.length){
        const id=hits[0].object.userData.id;
        if(id!==hovId){hovId=id;setCtxActive(id);stRef.current.active=id;renderer.domElement.style.cursor='pointer';}
      }else{hovId=null;renderer.domElement.style.cursor='default';}
    }
    renderer.domElement.addEventListener('mousemove',onMove);

    // Animate
    let aid;
    function animate(){
      aid=requestAnimationFrame(animate);
      const t=Date.now()*.001;
      const {active,floors}=stRef.current;
      meshes.forEach(m=>{
        const f=floors.find(x=>x.id===m.userData.id);
        const mat=m.material;
        if(f?.alert){mat.emissive.setHex(0xef4444);mat.emissiveIntensity=1.2+Math.sin(t*5)*.8;}
        else if(m.userData.id===active){mat.emissive.setHex(0x22c55e);mat.color.setHex(0x0a3a14);mat.emissiveIntensity=2.0+Math.sin(t*2)*.4;mat.opacity=0.95;}
        else{mat.emissive.setHex(0x1a3a6e);mat.color.setHex(0x0d1e3a);mat.emissiveIntensity=Math.max(mat.emissiveIntensity-.06,0.5);mat.opacity=0.88;}
      });
      r1.rotation.z=t*.5;r2.rotation.z=-t*.3;
      rm1.opacity=.25+Math.sin(t*1.5)*.12;rm2.opacity=(.25+Math.sin(t*1.5)*.12)*.5;

      // Tooltip positioning
      if(tipRef.current){
        const {active:af}=stRef.current;
        const idx=FLOORS.findIndex(f=>f.id===af);
        if(idx>=0){
          const pos=new THREE.Vector3(-2,idx*(FH+FG)+FH/2+.4,2);
          pos.project(camera);
          const rect=renderer.domElement.getBoundingClientRect();
          const tx=(pos.x*.5+.5)*rect.width;
          const ty=(-pos.y*.5+.5)*rect.height;
          tipRef.current.style.left=`${Math.max(10,Math.min(tx+15,rect.width-200))}px`;
          tipRef.current.style.top=`${Math.max(10,Math.min(ty-70,rect.height-140))}px`;
          tipRef.current.style.display='block';
        }
      }
      // Smoothly center building in available area
      // Left panel=400px always, AI panel=360px when open → offset=(leftW-rightW)/2
      const targetOff=aiOpenRef.current?-20:-200;
      curOff+=(targetOff-curOff)*0.08;
      camera.setViewOffset(renderer.domElement.width,renderer.domElement.height,curOff,0,renderer.domElement.width,renderer.domElement.height);

      ctrl.update();renderer.render(scene,camera);
    }
    let curOff=-200;
    animate();

    function onResize(){
      const w=el.clientWidth,h=el.clientHeight;
      camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);
    }
    window.addEventListener('resize',onResize);
    return()=>{
      cancelAnimationFrame(aid);window.removeEventListener('resize',onResize);
      renderer.domElement.removeEventListener('mousemove',onMove);
      renderer.dispose();if(el.contains(renderer.domElement))el.removeChild(renderer.domElement);
    };
  },[]);

  const {floors,active}=useE();
  const af=floors.find(f=>f.id===active);
  const sp=af?Math.max(0,Math.round((1-af.optimized/af.live)*100)):25;

  return(
    <div ref={mountRef} style={{width:'100%',height:'100%',position:'relative'}}>
      <div ref={tipRef} style={{position:'absolute',display:'none',pointerEvents:'none',zIndex:20,background:'rgba(10,20,40,.95)',border:'1px solid rgba(255,255,255,.12)',borderRadius:10,padding:'12px 14px',minWidth:180,boxShadow:'0 8px 32px rgba(0,0,0,.5)'}}>
        {af&&<>
          <p style={{fontSize:14,fontWeight:700,marginBottom:8}}>{af.label}</p>
          <p style={{fontSize:11,color:'var(--muted)',marginBottom:2}}>Current consumption</p>
          <p style={{fontSize:16,fontWeight:700,marginBottom:8}}>{af.live} <span style={{fontSize:11,fontWeight:400}}>kWh</span></p>
          <p style={{fontSize:11,color:'var(--muted)',marginBottom:2}}>After optimization</p>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:15,fontWeight:700,color:'var(--primary)'}}>{af.optimized} <span style={{fontSize:11,fontWeight:400,color:'var(--primary)'}}>kWh</span></span>
            <span className="badge-green">+{sp}% <span className="dot"/></span>
          </div>
        </>}
      </div>
    </div>
  );
}

/* ══════════════════ GLOBE 3D ════════════════════════════════════ */
function Globe3D({onClose}){
  const mountRef=useRef(null);
  useEffect(()=>{
    const el=mountRef.current;if(!el)return;
    const W=el.clientWidth,H=el.clientHeight;
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(45,W/H,0.1,2000);
    camera.position.set(0,0,2.5);
    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
    renderer.setSize(W,H);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setClearColor(0x000005,1);
    el.appendChild(renderer.domElement);

    // Stars
    const starGeo=new THREE.BufferGeometry();
    const starCount=12000;const sp=new Float32Array(starCount*3);
    for(let i=0;i<starCount*3;i++) sp[i]=(Math.random()-0.5)*800;
    starGeo.setAttribute('position',new THREE.BufferAttribute(sp,3));
    const starMat=new THREE.PointsMaterial({color:0xffffff,size:0.6,sizeAttenuation:true,transparent:true,opacity:0.85});
    scene.add(new THREE.Points(starGeo,starMat));

    // Globe group
    const group=new THREE.Group();scene.add(group);

    // ── 高质量 canvas 占位：等矩形投影，海洋+极冠+大陆轮廓 ──────────────
    const pc=document.createElement('canvas');pc.width=1024;pc.height=512;
    const px=pc.getContext('2d');
    // 海洋：纬度渐变（赤道浅蓝绿 → 两极深蓝）
    const og=px.createLinearGradient(0,0,0,512);
    og.addColorStop(0,'#0a1830');og.addColorStop(0.18,'#0d2244');
    og.addColorStop(0.5,'#163c6e');og.addColorStop(0.82,'#0d2244');og.addColorStop(1,'#0a1830');
    px.fillStyle=og;px.fillRect(0,0,1024,512);
    // 极冠：南北极白色渐变
    const ng=px.createLinearGradient(0,0,0,90);ng.addColorStop(0,'rgba(240,248,255,0.95)');ng.addColorStop(1,'rgba(200,228,255,0)');
    px.fillStyle=ng;px.fillRect(0,0,1024,90);
    const sg=px.createLinearGradient(0,422,0,512);sg.addColorStop(0,'rgba(200,228,255,0)');sg.addColorStop(1,'rgba(240,248,255,0.92)');
    px.fillStyle=sg;px.fillRect(0,422,1024,90);
    // 大陆轮廓（简化等矩形多边形，按 lon→x, lat→y 映射 1024×512）
    function ll(lon,lat){return[((lon+180)/360)*1024,((90-lat)/180)*512];}
    function poly(pts,fill,alpha=1){
      px.beginPath();pts.forEach(([lo,la],i)=>{const[x,y]=ll(lo,la);i?px.lineTo(x,y):px.moveTo(x,y);});
      px.closePath();px.fillStyle=fill;px.globalAlpha=alpha;px.fill();px.globalAlpha=1;
    }
    // 非洲
    poly([[-18,15],[-5,35],[10,37],[30,32],[42,12],[42,-12],[35,-35],[18,-35],[12,-18],[8,5],[-5,5],[-18,15]],'#4a6b35',0.75);
    // 欧洲
    poly([[-10,35],[0,43],[15,44],[25,45],[30,60],[25,70],[10,58],[0,51],[-5,43],[-10,35]],'#4a6b35',0.72);
    // 亚洲（简化）
    poly([[25,45],[60,42],[80,32],[100,22],[120,22],[135,35],[140,42],[130,60],[100,72],[60,68],[35,65],[25,45]],'#4a6b35',0.72);
    // 北美洲
    poly([[-170,68],[-140,72],[-100,72],[-80,45],[-70,44],[-75,35],[-80,25],[-88,18],[-100,20],[-120,30],[-125,50],[-140,60],[-170,68]],'#4a6b35',0.72);
    // 南美洲
    poly([[-80,12],[-65,12],[-48,0],[-40,-10],[-38,-20],[-42,-34],[-58,-38],[-68,-55],[-72,-42],[-78,-35],[-75,-10],[-80,12]],'#4a6b35',0.72);
    // 澳洲
    poly([[114,-22],[122,-20],[132,-12],[140,-18],[148,-20],[152,-28],[146,-38],[138,-38],[128,-34],[116,-30],[114,-22]],'#4a6b35',0.72);
    // 格陵兰
    poly([[-55,76],[-30,84],[-18,77],[-25,68],[-45,65],[-55,68],[-55,76]],'#cce8ff',0.7);
    const placeholderTex=new THREE.CanvasTexture(pc);

    const loader=new THREE.TextureLoader();
    const geo=new THREE.SphereGeometry(1,64,64);
    // 若预缓存已就绪直接用；否则先用 canvas 占位，加载完无缝替换
    const globeMat=new THREE.MeshPhongMaterial({
      map:_earthTexCache||placeholderTex,
      specular:new THREE.Color(0x224466),shininess:20
    });
    const globeMesh=new THREE.Mesh(geo,globeMat);
    group.add(globeMesh);

    if(!_earthTexCache){
      loader.load('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg',
        tex=>{_earthTexCache=tex;globeMesh.material.map=tex;globeMesh.material.needsUpdate=true;},
        undefined,
        ()=>loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg',
          tex=>{_earthTexCache=tex;globeMesh.material.map=tex;globeMesh.material.needsUpdate=true;})
      );
    }

    // Atmosphere — inner glow
    group.add(new THREE.Mesh(new THREE.SphereGeometry(1.005,64,64),
      new THREE.MeshBasicMaterial({color:0x3a88ee,transparent:true,opacity:0.04,side:THREE.FrontSide})));
    // Atmosphere — outer halo (BackSide)
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.12,64,64),
      new THREE.MeshBasicMaterial({color:0x2255cc,transparent:true,opacity:0.12,side:THREE.BackSide})));
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.25,64,64),
      new THREE.MeshBasicMaterial({color:0x1133aa,transparent:true,opacity:0.06,side:THREE.BackSide})));

    // Clouds layer
    loader.load('https://unpkg.com/three-globe/example/img/earth-clouds.png',tex=>{
      const clouds=new THREE.Mesh(new THREE.SphereGeometry(1.01,64,64),
        new THREE.MeshPhongMaterial({map:tex,transparent:true,opacity:0.35,depthWrite:false}));
      group.add(clouds);
      clouds.userData.isCloud=true;
    });

    // Lights — sun from upper-right
    scene.add(new THREE.AmbientLight(0x223355,2.5));
    const sun=new THREE.DirectionalLight(0xffffff,2.8);sun.position.set(5,3,5);scene.add(sun);
    const fill=new THREE.DirectionalLight(0x334488,0.8);fill.position.set(-3,-1,-3);scene.add(fill);

    // Drag + zoom
    let drag=false,lx=0,ly=0,ry=0.3,rx=0.2,camZ=2.5;
    const d=renderer.domElement;
    function dn(e){drag=true;lx=e.clientX;ly=e.clientY;}
    function up(){drag=false;}
    function mv(e){if(!drag)return;ry+=(e.clientX-lx)*.005;rx+=(e.clientY-ly)*.005;rx=Math.max(-1.2,Math.min(1.2,rx));lx=e.clientX;ly=e.clientY;}
    function wh(e){camZ+=e.deltaY*0.002;camZ=Math.max(1.3,Math.min(5.0,camZ));camera.position.z=camZ;}
    // Touch pinch zoom
    let lastPinch=0;
    function tp(e){if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastPinch=Math.hypot(dx,dy);}}
    function tm(e){if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const dist=Math.hypot(dx,dy);camZ-=(dist-lastPinch)*0.005;camZ=Math.max(1.3,Math.min(5.0,camZ));camera.position.z=camZ;lastPinch=dist;}}
    d.addEventListener('mousedown',dn);d.addEventListener('mouseup',up);d.addEventListener('mouseleave',up);d.addEventListener('mousemove',mv);
    d.addEventListener('wheel',wh,{passive:true});
    d.addEventListener('touchstart',tp,{passive:true});d.addEventListener('touchmove',tm,{passive:true});

    let aid;
    function animate(){
      aid=requestAnimationFrame(animate);
      if(!drag)ry+=.0015;
      group.rotation.y=ry;group.rotation.x=rx;
      group.children.forEach(c=>{if(c.userData.isCloud)c.rotation.y+=.0002;});
      renderer.render(scene,camera);
    }
    animate();

    function onR(){const w=el.clientWidth,h=el.clientHeight;camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);}
    window.addEventListener('resize',onR);
    return()=>{cancelAnimationFrame(aid);window.removeEventListener('resize',onR);d.removeEventListener('mousedown',dn);d.removeEventListener('mouseup',up);d.removeEventListener('mouseleave',up);d.removeEventListener('mousemove',mv);d.removeEventListener('wheel',wh);d.removeEventListener('touchstart',tp);d.removeEventListener('touchmove',tm);renderer.dispose();if(el.contains(d))el.removeChild(d);};
  },[]);

  return(
    <div ref={mountRef} style={{position:'fixed',inset:0,zIndex:100,background:'#000005'}}>
      <button onClick={onClose} style={{position:'absolute',bottom:20,right:20,zIndex:101,width:44,height:32,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:6,background:'rgba(59,130,246,0.25)',border:'1px solid rgba(59,130,246,0.55)',color:'#93c5fd',fontSize:11,fontWeight:700,cursor:'pointer'}}>2D</button>
    </div>
  );
}

/* ══════════════════ CITY VIEW IMAGES ═══════════════════════════ */
const VIEW_IMGS={
  Building:'building3d-mm.png',
  Zone:'zone-view.png',
};

/* ══════════════════ BUILDING VIEW ═══════════════════════════════ */
function BuildingView({aiOpen=false,onToggle3D}){
  const [tab,setTab]=useState('Building');
  const [bFloor,setBFloor]=useState(1);
  const [bImg,setBImg]=useState('building3d-mm.png');
  const [bHover,setBHover]=useState(false);
  const isBuilding=tab==='Floor';
  useEffect(()=>{
    const img=new Image();
    img.onload=()=>setBImg(img.naturalWidth>0?`building3d-l${bFloor}.png`:'building3d-mm.png');
    img.onerror=()=>setBImg('building3d-mm.png');
    img.src=`building3d-l${bFloor}.png`;
  },[bFloor]);
  return(
    <div style={{position:'absolute',inset:0}}>
      <div style={{position:'absolute',top:16,left:'50%',transform:'translateX(-50%)',display:'flex',gap:2,zIndex:10,background:'rgba(6,10,20,0.55)',borderRadius:100,padding:'2px',width:480}}>
        {['Campus','Building','Floor','Zone'].map(t=>{const a=t===tab;return(
          <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:'5px 16px',borderRadius:100,fontSize:16,fontWeight:a?700:400,color:a?'#fff':'rgba(255,255,255,0.85)',background:a?'#16171a':'transparent',border:'none',cursor:'pointer',transition:'all .15s'}}>{t}</button>
        );})}
      </div>
      {isBuilding?(
        <>
          <Building3D aiOpen={aiOpen}/>
          <FloorSelector/>
        </>
      ):(
        <div style={{position:'absolute',inset:0}}>
          {tab==='Campus'?(
            <video key="city-video" src="city-view.mp4" autoPlay loop muted playsInline style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center'}}/>
          ):(
            <img src={tab==='Building'?bImg:VIEW_IMGS[tab]} alt={tab} style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center'}}/>
          )}
          <div style={{position:'absolute',inset:0,background:'rgba(7,13,26,.15)'}}/>
          {tab==='Building'&&(<>
            {/* ── Main Hospital Building pill + vertical connector ── */}
            <a href="http://test.hokoemc.com:8060/login?redirect=/power/electricChart" target="_blank" rel="noopener noreferrer"
              style={{position:'absolute',top:'22.13%',left:'53.28%',background:'rgba(24,25,31,0.20)',border:'1px solid rgba(255,255,255,0.20)',borderRadius:100,padding:'11px 29px',width:227,height:41,fontSize:16,fontWeight:500,color:'#fff',whiteSpace:'nowrap',zIndex:10,letterSpacing:'0.01em',cursor:'pointer',textDecoration:'none',display:'flex',alignItems:'center',justifyContent:'center'}}>
              Main Hospital Building
            </a>
            {/* vertical line below label */}
            <div style={{position:'absolute',left:'calc(53.28% + 113px)',top:'calc(22.13% + 41px)',width:1,height:54,background:'rgba(255,255,255,0.45)',zIndex:9}}/>
            {/* dot at bottom of line */}
            <div style={{position:'absolute',left:'calc(53.28% + 108px)',top:'calc(22.13% + 93px)',width:10,height:10,borderRadius:'50%',border:'1.5px solid rgba(255,255,255,0.65)',background:'rgba(24,25,31,0.5)',zIndex:9}}/>

            {/* ── Floor selector ── */}
            <div style={{position:'absolute',left:420,top:'50%',transform:'translateY(-50%)',display:'flex',flexDirection:'column',gap:8,zIndex:10,width:36}}>
              {[7,6,5,4,3,2,1].map(f=>(
                <button key={f} onClick={()=>setBFloor(f)} style={{background:bFloor===f?'#18191f':'none',border:'none',cursor:'pointer',fontSize:16,fontWeight:bFloor===f?700:400,color:bFloor===f?'#fff':'#8b9ab5',padding:'2px 4px',borderRadius:100,textAlign:'center',transition:'all .15s'}}>{f}F</button>
              ))}
            </div>

            {(()=>{
              const floorData=FLOORS.find(f=>f.id===bFloor)||FLOORS[FLOORS.length-1];
              const top=`${76-(bFloor-1)*8}%`;
              const savings=Math.round((1-floorData.optimized/floorData.consumption)*100);
              // Tooltip fixed position (Figma: left 29.06%, top 27.41%)
              const tipLeft='29.06%'; const tipTop='27.41%';
              return(<>
                {/* hover zone on floor band */}
                <div
                  onMouseEnter={()=>setBHover(true)}
                  onMouseLeave={()=>setBHover(false)}
                  style={{position:'absolute',left:'30%',width:'50%',top,height:'14%',zIndex:11,cursor:'default'}}
                />
                {bHover&&(<>
                  {/* ── Tooltip card ── */}
                  <div style={{position:'absolute',left:tipLeft,top:tipTop,zIndex:20,
                    background:'rgba(24,25,31,0.20)',border:'1px solid rgba(255,255,255,0.20)',
                    borderRadius:12,padding:17,width:184,
                    pointerEvents:'none',display:'flex',flexDirection:'column',gap:12}}>
                    <div style={{fontSize:14,fontWeight:500,color:'#fff'}}>{bFloor} Floor</div>
                    <div style={{display:'flex',flexDirection:'column',gap:4}}>
                      <div style={{fontSize:12,color:'rgba(255,255,255,0.45)'}}>Current consumption</div>
                      <div><span style={{fontSize:16,fontWeight:500,color:'#fff'}}>{floorData.consumption} </span><span style={{fontSize:11,fontWeight:500,color:'#fff'}}>kWh</span></div>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:4}}>
                      <div style={{fontSize:12,color:'rgba(255,255,255,0.45)'}}>After optimization</div>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                        <div><span style={{fontSize:15,fontWeight:500,color:'#5576ef'}}>{floorData.optimized} </span><span style={{fontSize:11,fontWeight:500,color:'#5576ef'}}>kWh</span></div>
                        <div style={{display:'flex',alignItems:'center',gap:4}}>
                          <span style={{fontSize:15,fontWeight:500,color:'#22c55e'}}>+{savings}%</span>
                          <GreenDot/>
                        </div>
                      </div>
                    </div>
                  </div>
                  {/* ── Diagonal connector: tooltip bottom → floor band (using viewBox percentages) ── */}
                  {(()=>{
                    // Tooltip bottom-center in % of viewport: left 29.06%+92px≈34%, top 27.41%+148px≈41.1%
                    // Floor band target: ~55% x, floor top + 7%
                    const bandTopPct = 76-(bFloor-1)*8;
                    const x1=34, y1=41;
                    const x2=55, y2=bandTopPct+7;
                    return(
                      <svg style={{position:'absolute',left:0,top:0,width:'100%',height:'100%',zIndex:19,pointerEvents:'none'}} viewBox="0 0 100 100" preserveAspectRatio="none">
                        <line x1={`${x1}%`} y1={`${y1}%`} x2={`${x2}%`} y2={`${y2}%`}
                              stroke="rgba(255,255,255,0.45)" strokeWidth="0.1" strokeDasharray="0.4 0.3"/>
                        <circle cx={`${x1}%`} cy={`${y1}%`} r="0.5"
                                fill="rgba(24,25,31,0.5)" stroke="rgba(255,255,255,0.65)" strokeWidth="0.15"/>
                        <circle cx={`${x2}%`} cy={`${y2}%`} r="0.5"
                                fill="rgba(24,25,31,0.5)" stroke="rgba(255,255,255,0.65)" strokeWidth="0.15"/>
                      </svg>
                    );
                  })()}
                </>)}
              </>);
            })()}
          </>)}
        </div>
      )}
      <MapControls onToggle3D={onToggle3D}/>
    </div>
  );
}

/* ══════════════════ INTRO SCREEN ════════════════════════════════ */
function IntroScreen({onDone}){
  const [fading,setFading]=useState(false);
  function dismiss(){setFading(true);setTimeout(onDone,600);}
  useEffect(()=>{const t=setTimeout(dismiss,8000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',inset:0,zIndex:1000,background:'#000',opacity:fading?0:1,transition:'opacity .6s ease',pointerEvents:fading?'none':'auto'}}>
      <video src="city-view.mp4" poster="city-overview.png" autoPlay muted playsInline preload="auto" onEnded={dismiss}
        style={{width:'100%',height:'100%',objectFit:'cover'}}/>
      <button onClick={dismiss} style={{position:'absolute',bottom:32,right:32,padding:'8px 24px',borderRadius:20,background:'rgba(255,255,255,0.12)',border:'1px solid rgba(255,255,255,0.28)',color:'#fff',fontSize:13,fontWeight:500,cursor:'pointer',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)',letterSpacing:'0.02em',transition:'background .2s'}}
        onMouseEnter={e=>e.target.style.background='rgba(255,255,255,0.22)'}
        onMouseLeave={e=>e.target.style.background='rgba(255,255,255,0.12)'}>
        Skip ›
      </button>
    </div>
  );
}
